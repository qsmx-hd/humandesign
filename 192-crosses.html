body{font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

.header h1{font-size:28px;font-weight:700;letter-spacing:4px;position:relative;z-index:1}
.header h1 .accent{color:var(--gold)}
.header .subtitle{font-size:14px;color:var(--gold-light);margin-top:8px;letter-spacing:2px;position:relative;z-index:1}
.header .badge{display:inline-block;margin-top:10px;padding:3px 14px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;background:rgba(196,149,106,0.2);color:var(--gold-light);border:1px solid rgba(196,149,106,0.3);position:relative;z-index:1}
.header .divider{width:60px;height:2px;background:var(--gold);margin:16px auto 0;position:relative;z-index:1}
.stats-bar{display:flex;justify-content:center;gap:24px;padding:16px 20px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat-item{text-align:center}
.stat-item .num{font-size:24px;font-weight:700;color:var(--gold)}
.stat-item .label{font-size:12px;color:var(--text-muted)}
.filter-section{background:var(--bg-card);padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px var(--shadow)}
.search-box{position:relative;margin-bottom:16px}

.search-box input:focus{border-color:var(--gold)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-muted)}

.filter-group select:focus{border-color:var(--gold)}
.angle-tabs{display:flex;gap:0;margin-top:12px;border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--border)}
.angle-tab{flex:1;padding:10px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:#FFF;color:var(--text-muted);transition:all .3s;border:none;font-family:inherit}
.angle-tab:hover{background:var(--gold-light)}
.angle-tab.active-RA{background:var(--ra);color:#FFF}
.angle-tab.active-JX{background:var(--jx);color:#FFF}
.angle-tab.active-LA{background:var(--la);color:#FFF}
.angle-tab.active-ALL{background:var(--bg-dark);color:var(--gold)}
.angle-tab .pct{display:block;font-size:11px;font-weight:400;opacity:.8}
.results-info{padding:12px 20px;font-size:13px;color:var(--text-muted);background:var(--bg)}

.cross-card .gate-badge.la{background:var(--la)}

.cross-card .angle-badge.ra{background:var(--ra)}
.cross-card .angle-badge.jx{background:var(--jx)}
.cross-card .angle-badge.la{background:var(--la)}

.cross-card .gate-pair .sep{color:var(--border);margin:0 1px}
.cross-card .quarter-tag{display:inline-block;margin-top:8px;padding:3px 10px;background:var(--bg);border-radius:20px;font-size:11px;color:var(--text-muted)}

.modal{background:var(--bg-card);border-radius:var(--radius);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(45,33,24,0.3);animation:modalIn .3s ease}

["38","紧张","Tension","反对","Opposition","个人主义","Individualism","38/39","48/21","57/51"],
["54","渗透","Penetration","雄心","Ambition","循环","Cycles","54/53","57/51","32/42"],
["61","马雅","Maya","思考","Thinking","遮蔽","Obscuration","61/62","32/42","50/3"],
["60","律法","Laws","限制","Limitation","分心","Distraction","60/56","50/3","28/27"],
["41","意料之外","Unexpected","幻想","Fantasy","创始者","Alpha","41/31","28/27","44/24"],
["19","四方之路","Four Ways","需要","Need","精致","Refinement","19/33","44/24","1/2"]
]}
];

const ANGLE_INFO={
  RA:{name:"右角度交叉",en:"Right Angle Cross",icon:"→",pct:"~64%",desc:"右角度交叉的人（线1-3），其人生主题带有较强的个人色彩。他们通过自身的经历来理解和完成自己的使命，与他人的互动是辅助性的。"},
  JX:{name:"并列交叉",en:"Juxtaposition Cross",icon:"⇌",pct:"~3%",desc:"并列交叉的人（线4），其人生主题处于固定位置，既非完全个人化也非完全人际化。他们是命运中的「固定点」，具有独特的连接作用。"},
  LA:{name:"左角度交叉",en:"Left Angle Cross",icon:"←",pct:"~33%",desc:"左角度交叉的人（线5-6），其人生主题与他人的关系密不可分。他们需要通过与他人的互动来完成自己的使命，关系是核心。"}
};

// Build flat cross list
let allCrosses=[];
QUARTERS.forEach(q=>{
  q.g.forEach(g=>{
    const [gate,raName,raNameEn,jxName,jxNameEn,laName,laNameEn,persPair,raDesPair,jxlaDesPair]=g;
    const [cSun,cEarth]=persPair.split('/');
    // RA cross
    const [raDSun,raDEarth]=raDesPair.split('/');
    allCrosses.push({gate,quarterId:q.id,quarterName:q.n,quarterEn:q.e,quarterTheme:q.t,quarterIcon:q.icon,quarterDesc:q.d,angle:"RA",name:raName,nameEn:raNameEn,cSun,cEarth,dSun:raDSun,dEarth:raDEarth,config:persPair+'|'+raDesPair});
    // JX cross
    const [jxDSun,jxDEarth]=jxlaDesPair.split('/');
    allCrosses.push({gate,quarterId:q.id,quarterName:q.n,quarterEn:q.e,quarterTheme:q.t,quarterIcon:q.icon,quarterDesc:q.d,angle:"JX",name:jxName,nameEn:jxNameEn,cSun,cEarth,dSun:jxDSun,dEarth:jxDEarth,config:persPair+'|'+jxlaDesPair});
    // LA cross
    allCrosses.push({gate,quarterId:q.id,quarterName:q.n,quarterEn:q.e,quarterTheme:q.t,quarterIcon:q.icon,quarterDesc:q.d,angle:"LA",name:laName,nameEn:laNameEn,cSun,cEarth,dSun:jxDSun,dEarth:jxDEarth,config:persPair+'|'+jxlaDesPair});
  });
});

// DOM refs
const searchInput=document.getElementById('searchInput');
const quarterFilter=document.getElementById('quarterFilter');
const gateFilter=document.getElementById('gateFilter');
const angleTabs=document.getElementById('angleTabs');
const crossGrid=document.getElementById('crossGrid');
const resultsInfo=document.getElementById('resultsInfo');
const modalOverlay=document.getElementById('modalOverlay');
const modalBadge=document.getElementById('modalBadge');
const modalName=document.getElementById('modalName');
const modalEnName=document.getElementById('modalEnName');
const modalBody=document.getElementById('modalBody');
const modalClose=document.getElementById('modalClose');
const scrollTopBtn=document.getElementById('scrollTopBtn');

let currentAngle='all';

// Populate filters
QUARTERS.forEach(q=>{
  const opt=document.createElement('option');
  opt.value=q.id;opt.textContent=q.n+' ('+q.t+')';
  quarterFilter.appendChild(opt);
});

function updateGateFilter(){
  const qId=quarterFilter.value;
  gateFilter.innerHTML='<option value="all">全部闸门</option>';
  const quarters=qId==='all'?QUARTERS:QUARTERS.filter(q=>q.id===qId);
  quarters.forEach(q=>{
    q.g.forEach(g=>{
      const opt=document.createElement('option');
      opt.value=g[0];opt.textContent='闸门 '+g[0]+' — '+g[1];
      gateFilter.appendChild(opt);
    });
  });
}
updateGateFilter();
quarterFilter.addEventListener('change',()=>{updateGateFilter();render();});

// Angle tabs
angleTabs.addEventListener('click',e=>{
  const tab=e.target.closest('.angle-tab');
  if(!tab)return;
  currentAngle=tab.dataset.angle;
  angleTabs.querySelectorAll('.angle-tab').forEach(t=>{
    t.className='angle-tab';
    if(t.dataset.angle===currentAngle) t.classList.add('active-'+(currentAngle==='all'?'ALL':currentAngle));
  });
  render();
});

// Search
searchInput.addEventListener('input',()=>render());
gateFilter.addEventListener('change',()=>render());

// Render
function render(){
  const search=searchInput.value.trim().toLowerCase();
  const qId=quarterFilter.value;
  const gId=gateFilter.value;
  const angle=currentAngle;

  let filtered=allCrosses.filter(c=>{
    if(qId!=='all'&&c.quarterId!==qId)return false;
    if(gId!=='all'&&c.gate!==gId)return false;
    if(angle!=='all'&&c.angle!==angle)return false;
    if(search){
      const s=search;
      return c.gate.includes(s)||c.name.includes(s)||c.nameEn.toLowerCase().includes(s)||c.config.includes(s)||c.quarterName.includes(s)||c.quarterTheme.includes(s);
    }
    return true;
  });

  resultsInfo.innerHTML='共找到 <strong>'+filtered.length+'</strong> 种轮回交叉';

  if(filtered.length===0){
    crossGrid.innerHTML='<div class="no-results">没有找到匹配的轮回交叉 🤔</div>';
    return;
  }

  crossGrid.innerHTML=filtered.map(c=>{
    const angleCls=c.angle.toLowerCase();
    const angleLabel=c.angle==='RA'?'右角度':c.angle==='JX'?'并列':'左角度';
    return `<div class="cross-card" onclick="showDetail('${c.gate}','${c.angle}')">
      <div class="card-header">
        <div class="gate-badge ${angleCls}">${c.gate}</div>
        <div class="card-title">
          <div class="cross-name">${c.name} · ${angleLabel}交叉</div>
          <div class="cross-name-en">${c.nameEn} Cross</div>
        </div>
        <span class="angle-badge ${angleCls}">${angleLabel}</span>
      </div>
      <div class="card-body">
        <div class="gate-config">
          <span class="gate-pair">☀ ${c.cSun} <span class="sep">|</span> 🌍 ${c.cEarth}</span>
          <span class="gate-pair">◑ ${c.dSun} <span class="sep">|</span> ◐ ${c.dEarth}</span>
        </div>
        <span class="quarter-tag">${c.quarterIcon} ${c.quarterName} · ${c.quarterTheme}</span>
      </div>
    </div>`;
  }).join('');
}

// Detail modal
function showDetail(gate,angle){
  const c=allCrosses.find(x=>x.gate===gate&&x.angle===angle);
  if(!c)return;
  const angleCls=angle.toLowerCase();
  const ai=ANGLE_INFO[angle];
  const angleLabel=angle==='RA'?'右角度':angle==='JX'?'并列':'左角度';

  modalBadge.className='gate-badge-lg '+angleCls;
  modalBadge.textContent=c.gate;
  modalName.textContent=c.name+' · '+angleLabel+'交叉';
  modalEnName.textContent=c.nameEn+' Cross';

  modalBody.innerHTML=`
    <div class="detail-section">
      <div class="detail-label">闸门配置 GATE CONFIGURATION</div>
      <div class="gate-diagram">
        <div class="gate-box conscious">
          <div class="type">意识 · Conscious</div>
          <div class="nums">☀ ${c.cSun} <span class="slash">|</span> 🌍 ${c.cEarth}</div>
        </div>
        <div class="gate-box unconscious">
          <div class="type">潜意识 · Unconscious</div>
          <div class="nums">◑ ${c.dSun} <span class="slash">|</span> ◐ ${c.dEarth}</div>
        </div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">完整配置 FULL CONFIG</div>
      <div style="padding:12px;background:var(--bg);border-radius:var(--radius-sm);text-align:center;font-size:18px;font-weight:700;color:var(--text);letter-spacing:1px">
        ${c.cSun}/${c.cEarth} | ${c.dSun}/${c.dEarth}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">角度家族 ANGLE FAMILY</div>
      <div class="angle-type-box">
        <div class="icon">${ai.icon}</div>
        <div class="angle-info">
          <h4>${ai.name}</h4>
          <p>${ai.en} · 占比${ai.pct}</p>
          <p style="margin-top:6px">${ai.desc}</p>
        </div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">所属等分 QUARTER</div>
      <div class="quarter-box">
        <h4>${c.quarterIcon} ${c.quarterName}</h4>
        <div class="en">${c.quarterEn} · ${c.quarterTheme}</div>
        <p>${c.quarterDesc}</p>
      </div>
    </div>
  `;

  modalOverlay.classList.add('active');
  document.body.style.overflow='';
}

modalClose.addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function closeModal(){
  modalOverlay.classList.remove('active');
  document.body.style.overflow='';
}

// Scroll top
window.addEventListener('scroll',()=>{
  scrollTopBtn.classList.toggle('visible',window.scrollY>400);
});
scrollTopBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

// Init
render();
</script>
</body>
</html>
