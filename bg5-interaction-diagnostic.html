.person-card { background: #FDFAF5; border-radius: 12px; padding: 20px; border: 1px solid #E8DCC8; }

#reportSection.show { display: block; }

/* Type interaction card */
.interaction-card { background: #FDFAF5; border-radius: 10px; padding: 16px; margin-bottom: 14px; border: 1px solid #E8DCC8; }
.interaction-card .ic-title { font-size: 14px; font-weight: 500; color: #2D2118; margin-bottom: 8px; }

// ========== Initialization ==========
let gatesA = new Set();
let gatesB = new Set();

function init() {
  renderChannelGrid('A');
  renderChannelGrid('B');
  // Set initial avatar colors
  ['A','B'].forEach(p => {
    updateAvatar(p);
    validatePerson(p);
    document.getElementById('definition'+p).addEventListener('change', () => validatePerson(p));
    document.getElementById('authority'+p).addEventListener('change', () => validatePerson(p));
  });
}

function renderChannelGrid(person) {
  const grid = document.getElementById('channelGrid' + person);
  let html = '';
  for (let g = 1; g <= 64; g++) {
    html += `<span class="channel-tag" data-person="${person}" data-gate="${g}" onclick="toggleGate('${person}',${g})">${g}</span>`;
  }
  grid.innerHTML = html;
}

function toggleGate(person, gate) {
  const set = person === 'A' ? gatesA : gatesB;
  if (set.has(gate)) set.delete(gate);
  else set.add(gate);
  updateGateUI(person);
}

function updateGateUI(person) {
  const set = person === 'A' ? gatesA : gatesB;
  document.querySelectorAll(`#channelGrid${person} .channel-tag`).forEach(el => {
    const g = parseInt(el.dataset.gate);
    el.classList.toggle('selected', set.has(g));
  });
}

// ========== Type-aware auto-correction (shared with Tool A) ==========
function onPersonTypeChange(person) {
  const type = document.getElementById('type'+person).value;
  if (type === 'reflector') {
    document.getElementById('definition'+person).value = 'none';
    document.getElementById('authority'+person).value = 'lunar';
  }
  validatePerson(person);
  updateAvatar(person);
}

function updateAvatar(person) {
  const type = document.getElementById('type'+person).value;
  const el = document.getElementById('avatar'+person);
  el.className = 'avatar type-' + type;
}

// ========== Cross-validation (exact same rules as Tool A) ==========
function validatePerson(person) {
  const type = document.getElementById('type'+person).value;
  const def = document.getElementById('definition'+person).value;
  const auth = document.getElementById('authority'+person).value;
  const errors = [];

  // Type ↔ Authority
  if (type === 'generator' || type === 'manifesting_generator') {
    if (auth !== 'sacral' && auth !== 'emotional') {
      errors.push('生产者/显示生产者必须有定义的荐骨中心，内在权威只能是「荐骨权威」或「情绪权威」。');
    }
  }
  if (type === 'projector' && auth === 'sacral') {
    errors.push('投射者没有定义的荐骨中心，不可能是「荐骨权威」。');
  }
  if (type === 'manifestor' && auth === 'sacral') {
    errors.push('显示者没有定义的荐骨中心，不可能是「荐骨权威」。');
  }
  if (type === 'reflector' && auth !== 'lunar') {
    errors.push('反映者没有任何定义的内在权威中心，内在权威必须是「月循环权威」。');
  }

  // Type ↔ Definition
  if (type === 'reflector' && def !== 'none') {
    errors.push('反映者所有能量中心均未定义，能量定义必须是「无定义」。');
  }
  if (def === 'none' && type !== 'reflector') {
    errors.push('「无定义」只可能出现在反映者身上。');
  }

  // Definition ↔ Authority
  if (def === 'none' && auth !== 'lunar') {
    errors.push('「无定义」意味着没有定义的内在权威中心，必须是「月循环权威」。');
  }
  if (auth === 'lunar' && def !== 'none') {
    errors.push('「月循环权威」只可能出现在「无定义」（反映者）身上。');
  }

  // Visual feedback
  const card = document.getElementById('person'+person+'Card');
  if (errors.length > 0) {
    card.style.borderColor = '#D84338';
    card.title = errors.join('；');
  } else {
    card.style.borderColor = '#E8DCC8';
    card.title = '';
  }
  return errors;
}

// ========== Diagnosis Engine ==========
function runDiagnosis() {
  const nameA = document.getElementById('nameA').value.trim() || '成员A';
  const nameB = document.getElementById('nameB').value.trim() || '成员B';
  const typeA = document.getElementById('typeA').value;
  const typeB = document.getElementById('typeB').value;
  const profileA = document.getElementById('profileA').value;
  const profileB = document.getElementById('profileB').value;
  const defA = document.getElementById('definitionA').value;
  const defB = document.getElementById('definitionB').value;
  const authA = document.getElementById('authorityA').value;
  const authB = document.getElementById('authorityB').value;

  // Validate both
  const errA = validatePerson('A');
  const errB = validatePerson('B');
  if (errA.length > 0 || errB.length > 0) {
    alert('请先修正标红的错误后再开始合图分析。');
    return;
  }

  // Show report
  document.getElementById('reportSection').classList.add('show');
  // Print: fill person info summary on first page (basic info only, no channels)
  const infoEl = document.getElementById('printPersonInfo');
  infoEl.innerHTML = buildPrintBasicInfoHtml(nameA, nameB, typeA, typeB, profileA, profileB, defA, defB, authA, authB);
  infoEl.style.display = 'block';
  // Print title: show names
  document.getElementById('printPersonTitle').textContent = `${nameA} × ${nameB} — 两人基本信息`;

  renderTypeInteraction(nameA, nameB, typeA, typeB);
  renderProfileInteraction(nameA, nameB, profileA, profileB);
  renderDefInteraction(nameA, nameB, defA, defB);
  renderAuthInteraction(nameA, nameB, authA, authB);
  renderChannelSynergy(nameA, nameB);
  renderPenta2(nameA, nameB, typeA, typeB, defA, defB, gatesA, gatesB);
  renderAdvice(nameA, nameB, typeA, typeB, profileA, profileB, defA, defB, authA, authB);

  // Scroll to report
  document.getElementById('reportSection').scrollIntoView({ behavior: 'smooth' });
}

function buildPrintBasicInfoHtml(nameA, nameB, typeA, typeB, profileA, profileB, defA, defB, authA, authB) {

// ========== Print helper: build person channels HTML (used for reference) ==========
function buildPrintPersonChannelsHtml(nameA, nameB, typeA, typeB, profileA, profileB, defA, defB, authA, authB) {
  // Collect A/B data
  const aFullChannels = CHANNELS.filter(ch => gatesA.has(ch.g1) && gatesA.has(ch.g2)).map(ch => ch.id);
  const aFullGateSet = new Set();
  aFullChannels.forEach(c => {
    const [g1, g2] = c.split('-').map(Number);
    aFullGateSet.add(g1); aFullGateSet.add(g2);
  });
  const aSingleGates = [...gatesA].filter(g => !aFullGateSet.has(g)).sort((a, b) => a - b);

  const bFullChannels = CHANNELS.filter(ch => gatesB.has(ch.g1) && gatesB.has(ch.g2)).map(ch => ch.id);
  const bFullGateSet = new Set();
  bFullChannels.forEach(c => {
    const [g1, g2] = c.split('-').map(Number);
    bFullGateSet.add(g1); bFullGateSet.add(g2);
  });
  const bSingleGates = [...gatesB].filter(g => !bFullGateSet.has(g)).sort((a, b) => a - b);

  function personBlock(name, type, profile, def, auth, fullChannels, singleGates) {
    let h = '<div style="font-size:13px;line-height:1.8;">';
    h += '<div style="font-weight:600;color:#2D2118;margin-bottom:4px;">' + name + '</div>';
    h += '<div style="color:#8B7355;margin-bottom:6px;">' + TYPE_NAMES[type] + ' | ' + PROFILE_NAMES[profile] + ' | ' + DEFINITION_NAMES[def] + ' | ' + AUTHORITY_NAMES[auth] + '</div>';
    if (fullChannels.length > 0) {
      h += '<div style="margin-bottom:4px;"><strong>完整通道（' + fullChannels.length + '条）：</strong></div>';
      h += '<ul style="padding-left:18px;margin-bottom:6px;">';
      fullChannels.forEach(c => {
        const info = getChannelInfo(c);
        h += '<li>通道 <strong>' + c + ' ' + info.name + '</strong>：' + info.talent + '</li>';
      });
      h += '</ul>';
    }
    if (singleGates.length > 0) {
      h += '<div><strong>单闸门（' + singleGates.length + '个）：</strong> ' + singleGates.join(', ') + '</div>';
      h += '<div style="font-size:11px;color:#8B7355;">单闸门是通道的「一半」，与合适的人互补可形成完整通道。</div>';
    }
    if (fullChannels.length === 0 && singleGates.length === 0) {
      h += '<div style="color:#8B7355;">未选择任何闸门。</div>';
    }
    h += '</div>';
    return h;
  }

  return '<div style="padding:16px; background:#FDFAF5; border-radius:8px; border:1px solid #E8DCC8;">' +
    '<div style="font-weight:600;color:#C4956A;margin-bottom:12px;font-size:14px;">👤 ' + nameA + ' 的通道与闸门</div>' +
    personBlock(nameA, typeA, profileA, defA, authA, aFullChannels, aSingleGates) +
    '<div style="border-top:1px dashed #E8DCC8;margin:14px 0;"></div>' +
    '<div style="font-weight:600;color:#C4956A;margin-bottom:12px;font-size:14px;">👤 ' + nameB + ' 的通道与闸门</div>' +
    personBlock(nameB, typeB, profileB, defB, authB, bFullChannels, bSingleGates) +
    '</div>';
}

  const icon = data.level === 'good' ? '✅' : data.level === 'warn' ? '⚠️' : '❌';

  document.getElementById('typeInteractionContent').innerHTML = `

  'single-none': '一分人+反映者：一分人持续输出，反映者随环境起伏。反映者会 mirror 一分人的状态，一分人需注意自己的情绪对反映者的影响。',
  'split-split': '两位二分人：都经历能量的高低起伏，可以互相理解「不在状态」的感受。注意双方在低能量期可能同时失去动力。',
  'split-none': '二分人+反映者：二分人虽有间断的定义能量，反映者完全没有定义能量。反映者的 mirror 效应对二分人既是支持也是挑战。',

}

// ========== Authority Interaction ==========
function renderAuthInteraction(nameA, nameB, authA, authB) {
  const same = authA === authB;
  const aName = AUTHORITY_NAMES[authA];
  const bName = AUTHORITY_NAMES[authB];
  let text = '';
  if (same) {
    text = `两人都是「${aName}」，决策方式和时机高度相似，可以建立很流畅的决策协作。注意：相同的权威也可能放大共同的盲点。`;
  } else if (authA === 'lunar' || authB === 'lunar') {
    const refName = authA === 'lunar' ? nameA : nameB;
    text = `其中一方是月循环权威（${refName}），需要完整一个月周期来清晰决策。另一方需理解这不是「优柔寡断」，而是必要的决策过程，避免在中间强行推动决定。`;
  } else if ((authA === 'sacral' && authB === 'emotional') || (authA === 'emotional' && authB === 'sacral')) {
    text = `荐骨权威（即时清晰）与情绪权威（需要时间沉淀）的组合：荐骨方需理解情绪方「不是现在」不代表「不」，情绪方需理解荐骨方的即时反应是其权威的体现。`;
  } else {
    text = `${aName} 与 ${bName} 的决策节奏和方式不同。建议在重要决策时，双方都用自己的权威清晰后，再进行共同讨论。`;

  document.getElementById('authInteractionContent').innerHTML = `

      <div class="ic-title">🎯 ${nameA}（${aName}） × ${nameB}（${bName}）</div>
      <div class="ic-body">${text}</div>
    </div>
  `;
}

// ========== Channel Synergy (4 Relationship Models) ==========
// 相伴Companionship: both have full channel
// 妥协Compromise: one full, other has exactly 1 gate
// 主导Dominance: one full, other has 0 gates
// 电磁效应Electromagnetic: each has 1 gate, together complete the channel
function renderChannelSynergy(nameA, nameB) {
  // ===== Step 1: Collect A and B individual channel/gate data =====
  const aFullChannels = CHANNELS.filter(ch => gatesA.has(ch.g1) && gatesA.has(ch.g2)).map(ch => ch.id);
  const aFullGateSet = new Set();
  aFullChannels.forEach(c => {
    const [g1, g2] = c.split('-').map(Number);
    aFullGateSet.add(g1);
    aFullGateSet.add(g2);
  });
  const aSingleGates = [...gatesA].filter(g => !aFullGateSet.has(g)).sort((a, b) => a - b);

  const bFullChannels = CHANNELS.filter(ch => gatesB.has(ch.g1) && gatesB.has(ch.g2)).map(ch => ch.id);
  const bFullGateSet = new Set();
  bFullChannels.forEach(c => {
    const [g1, g2] = c.split('-').map(Number);
    bFullGateSet.add(g1);
    bFullGateSet.add(g2);
  });
  const bSingleGates = [...gatesB].filter(g => !bFullGateSet.has(g)).sort((a, b) => a - b);

  // ===== Step 2: Compute 4 Relationship Models =====
  const companionship = [];
  const compromise = [];
  const dominance = [];
  const electromagnetic = [];

  CHANNELS.forEach(ch => {
    const a1 = gatesA.has(ch.g1), a2 = gatesA.has(ch.g2);
    const b1 = gatesB.has(ch.g1), b2 = gatesB.has(ch.g2);
    const aFull = a1 && a2;
    const bFull = b1 && b2;
    const aPart = a1 || a2;
    const bPart = b1 || b2;

    if (aFull && bFull) {
      companionship.push(ch.id);
    } else if (aFull && !bFull && bPart) {
      compromise.push({ ch: ch.id, full: nameA, part: nameB });
    } else if (bFull && !aFull && aPart) {
      compromise.push({ ch: ch.id, full: nameB, part: nameA });
    } else if (aFull && !bFull && !bPart) {
      dominance.push({ ch: ch.id, dom: nameA, sub: nameB });
    } else if (bFull && !aFull && !aPart) {
      dominance.push({ ch: ch.id, dom: nameB, sub: nameA });
    } else if (!aFull && !bFull && aPart && bPart) {
      const aG = [ch.g1, ch.g2].filter(g => gatesA.has(g));
      const bG = [ch.g1, ch.g2].filter(g => gatesB.has(g));
      const combined = new Set([...aG, ...bG]);
      if (combined.has(ch.g1) && combined.has(ch.g2) && aG.length > 0 && bG.length > 0) {
        electromagnetic.push(ch.id);
      }
    }
  });

  // Classify Penta pillars with proper const declarations
  const penta = { companionship: [], compromise: [], dominance: [], electromagnetic: [] };
  PENTA_PILLARS.forEach(p => {
    const [g1, g2] = p.channel.split('-').map(Number);
    const a1 = gatesA.has(g1), a2 = gatesA.has(g2);
    const b1 = gatesB.has(g1), b2 = gatesB.has(g2);
    const aFull = a1 && a2;
    const bFull = b1 && b2;
    const aPart = a1 || a2;
    const bPart = b1 || b2;

    if (aFull && bFull) {
      penta.companionship.push(p);
    } else if (aFull && !bFull && bPart) {
      penta.compromise.push({ ...p, full: nameA, part: nameB });
    } else if (bFull && !aFull && aPart) {
      penta.compromise.push({ ...p, full: nameB, part: nameA });
    } else if (aFull && !bFull && !bPart) {
      penta.dominance.push({ ...p, dom: nameA, sub: nameB });
    } else if (bFull && !aFull && !aPart) {
      penta.dominance.push({ ...p, dom: nameB, sub: nameA });
    } else if (!aFull && !bFull && aPart && bPart) {
      const aG = [g1, g2].filter(g => gatesA.has(g));
      const bG = [g1, g2].filter(g => gatesB.has(g));
      const combined = new Set([...aG, ...bG]);
      if (combined.has(g1) && combined.has(g2) && aG.length > 0 && bG.length > 0) {
        penta.electromagnetic.push(p);
      }
    }
  });

  // ===== Step 3: Render =====
  let html = '';

  // Section 1: Person A's channels and single gates
  html += '<div class="interaction-card">';
  html += '<div class="ic-title">👤 ' + nameA + ' 的通道与闸门</div>';
  html += '<div class="ic-body">';
  if (aFullChannels.length > 0) {
    html += '<p><strong>完整通道（' + aFullChannels.length + '条）：</strong></p><ul style="padding-left:20px;">';
    aFullChannels.forEach(c => {
      const info = getChannelInfo(c);
      html += '<li>通道 <strong>' + c + ' ' + info.name + '</strong>：' + info.talent + '</li>';
    });
    html += '</ul>';
  }
  if (aSingleGates.length > 0) {
    html += '<p style="margin-top:8px"><strong>单闸门（' + aSingleGates.length + '个）：</strong> ' + aSingleGates.join(', ') + '</p>';
    html += '<p style="font-size:12px;color:#8B7355;margin-top:2px;">单闸门是通道的「一半」，与合适的人互补可形成完整通道。</p>';
  }
  if (aFullChannels.length === 0 && aSingleGates.length === 0) {
    html += '<p style="color:#8B7355;">' + nameA + ' 未选择任何闸门。</p>';
  }
  html += '</div></div>';

  // Section 2: Person B's channels and single gates
  html += '<div class="interaction-card">';
  html += '<div class="ic-title">👤 ' + nameB + ' 的通道与闸门</div>';
  html += '<div class="ic-body">';
  if (bFullChannels.length > 0) {
    html += '<p><strong>完整通道（' + bFullChannels.length + '条）：</strong></p><ul style="padding-left:20px;">';
    bFullChannels.forEach(c => {
      const info = getChannelInfo(c);
      html += '<li>通道 <strong>' + c + ' ' + info.name + '</strong>：' + info.talent + '</li>';
    });
    html += '</ul>';
  }
  if (bSingleGates.length > 0) {
    html += '<p style="margin-top:8px"><strong>单闸门（' + bSingleGates.length + '个）：</strong> ' + bSingleGates.join(', ') + '</p>';
    html += '<p style="font-size:12px;color:#8B7355;margin-top:2px;">单闸门是通道的「一半」，与合适的人互补可形成完整通道。</p>';
  }
  if (bFullChannels.length === 0 && bSingleGates.length === 0) {
    html += '<p style="color:#8B7355;">' + nameB + ' 未选择任何闸门。</p>';
  }
  html += '</div></div>';

  // Section 3: 4 Relationship Models
  const hasAny = companionship.length > 0 || compromise.length > 0 || dominance.length > 0 || electromagnetic.length > 0
    || penta.companionship.length > 0 || penta.compromise.length > 0 || penta.dominance.length > 0 || penta.electromagnetic.length > 0;

  // 如果两人都未输入任何闸门，显示提示
  if (gatesA.size === 0 && gatesB.size === 0) {
    html += '<div class="interaction-card"><div class="ic-body" style="color:#8B7355;">两人未选择任何闸门，请在上方选择两人各自的闸门（1-64）以进行通道互补分析。</div></div>';
  } else {
    // ===== 1. 相伴（Companionship） — 无论有无结果均显示 =====
    {
      let items = companionship.map(c => {
        const info = getChannelInfo(c);
        return '<li>通道 <strong>' + c + ' ' + info.name + '</strong>：两人都完整持有。天赋含义：' + info.talent + '</li>';
      }).join('');
      if (penta.companionship.length > 0) {
        items += penta.companionship.map(p => {
          const info = getChannelInfo(p.channel);
          return '<li>🔑 Penta支柱 <strong>' + p.channel + ' ' + p.name + '</strong>：两人都完整持有。' + info.talent + '</li>';
        }).join('');
      }
      html += '<div class="interaction-card">';
      html += '<div class="ic-title">🤝 相伴（Companionship）</div>';
      html += '<div class="ic-subtitle">两人都拥有完整的同一条通道，对同一主题有完全相同的能量体验，相处轻松、互相理解。</div>';
      html += '<div class="ic-body">';
      if (items) {
        html += '<ul style="padding-left:20px;">' + items + '</ul>';
      } else {
        html += '<p style="color:#8B7355;">无。合图中未形成相伴通道。</p>';
      }
      html += '</div></div>';
    }
    // ===== 2. 妥协（Compromise） — 无论有无结果均显示 =====
    {
      let items = compromise.map(x => {
        const info = getChannelInfo(x.ch);
        return '<li>通道 <strong>' + x.ch + ' ' + info.name + '</strong>：' + x.part + ' 只有其中一端的闸门，会主动向 ' + x.full + ' 妥协适配。天赋含义：' + info.talent + '</li>';
      }).join('');
      if (penta.compromise.length > 0) {
        items += penta.compromise.map(x => {
          const info = getChannelInfo(x.channel);
          return '<li>🔑 Penta支柱 <strong>' + x.channel + ' ' + x.name + '</strong>：' + x.part + ' 只有一端闸门，向 ' + x.full + ' 妥协。' + info.talent + '</li>';
        }).join('');
      }
      html += '<div class="interaction-card">';
      html += '<div class="ic-title">⚖️ 妥协（Compromise）</div>';
      html += '<div class="ic-subtitle">其中一方拥有完整通道，另一方只有一端闸门，没有完整定义。有闸门的一方会主动或被动地「妥协」于另一方的能量模式。</div>';
      html += '<div class="ic-body">';
      if (items) {
        html += '<ul style="padding-left:20px;">' + items + '</ul>';
      } else {
        html += '<p style="color:#8B7355;">无。合图中未形成妥协通道。</p>';
      }
      html += '</div></div>';
    }
    // ===== 3. 主导（Dominance） — 无论有无结果均显示 =====
    {
      let items = dominance.map(x => {
        const info = getChannelInfo(x.ch);
        return '<li>通道 <strong>' + x.ch + ' ' + info.name + '</strong>：' + x.dom + ' 拥有完整通道，' + x.sub + ' 完全没有此通道的闸门，只能接受并臣服于 ' + x.dom + ' 的能量影响。天赋含义：' + info.talent + '</li>';
      }).join('');
      if (penta.dominance.length > 0) {
        items += penta.dominance.map(x => {
          const info = getChannelInfo(x.channel);
          return '<li>🔑 Penta支柱 <strong>' + x.channel + ' ' + x.name + '</strong>：' + x.dom + ' 拥有完整通道，' + x.sub + ' 无此闸门，被 ' + x.dom + ' 的能量主导。' + info.talent + '</li>';
        }).join('');
      }
      html += '<div class="interaction-card">';
      html += '<div class="ic-title">👑 主导（Dominance）</div>';
      html += '<div class="ic-subtitle">其中一方拥有完整通道，另一方完全没有此通道的任何闸门。无闸门的一方会完全被另一方定义的能量所覆盖，不存在协商空间。</div>';
      html += '<div class="ic-body">';
      if (items) {
        html += '<ul style="padding-left:20px;">' + items + '</ul>';
      } else {
        html += '<p style="color:#8B7355;">无。合图中未形成主导通道。</p>';
      }
      html += '</div></div>';
    }
    // ===== 4. 电磁效应 / 火花（Electromagnetic） — 无论有无结果均显示 =====
    {
      let items = electromagnetic.map(c => {
        const info = getChannelInfo(c);
        return '<li>通道 <strong>' + c + ' ' + info.name + '</strong>：两人各自持有不同端的闸门，在一起时互补形成完整通道，产生强烈的吸引与张力。天赋含义：' + info.talent + '</li>';
      }).join('');
      if (penta.electromagnetic.length > 0) {
        items += penta.electromagnetic.map(p => {
          const info = getChannelInfo(p.channel);
          return '<li>🔑 Penta支柱 <strong>' + p.channel + ' ' + p.name + '</strong>：两人互补形成此支柱通道，共同激活团队核心能量。' + info.talent + '</li>';
        }).join('');
      }
      html += '<div class="interaction-card">';
      html += '<div class="ic-title">⚡ 电磁效应 / 火花（Electromagnetic）</div>';
      html += '<div class="ic-subtitle">两人各自拥有同一条通道两端的相反闸门，单独时都不具备此能量，但在一起时共同创造出这条完整的通道。这是合图中吸引力最强的关系动态，同时存在吸引与排斥的张力。</div>';
      html += '<div class="ic-body">';
      if (items) {
        html += '<ul style="padding-left:20px;">' + items + '</ul>';
      } else {
        html += '<p style="color:#8B7355;">无。合图中未形成电磁效应（火花）通道。</p>';
      }
      html += '</div></div>';
    }
  }

  document.getElementById('channelSynergyContent').innerHTML = html;
}

// ========== Penta 2-person Diagnosis ==========
function renderPenta2(nameA, nameB, typeA, typeB, defA, defB, ga, gb) {
  const hasCore = PENTA_PILLARS.map(p => {
    const [g1, g2] = p.channel.split('-').map(Number);
    const aFull = ga.has(g1) && ga.has(g2);
    const bFull = gb.has(g1) && gb.has(g2);
    const spark = (ga.has(g1) || ga.has(g2)) && (gb.has(g1) || gb.has(g2)) && !aFull && !bFull;
    return { ...p, aFull, bFull, spark, has: aFull || bFull || spark };
  });

  let html = '<div class="interaction-card">';
  html += '<div class="ic-title">🔮 ' + nameA + ' × ' + nameB + ' — Penta 双人合图分析</div>';
  html += '<div class="ic-body">';
  html += '<p>以下为两人共同组成的 Penta 能量场分析：</p>';
  html += '<ul style="margin-top:8px;padding-left:20px;">';
  hasCore.forEach(p => {
    const status = p.aFull && p.bFull ? '✅ 双方均持有' : p.aFull ? ('✅ ' + nameA + '持有') : p.bFull ? ('✅ ' + nameB + '持有') : p.spark ? '⚡ 火花通道（互补）' : '— 未持有';
    html += '<li><strong>' + p.channel + ' ' + p.name + '</strong>：' + status;
    if (!p.has) {
      html += ' — 此支柱能量在两人关系中缺失，可能需要在团队中由其他成员补充';
    }
    html += '<br><span style="color:#8B7355;font-size:12px;">' + p.talent + '</span>';
    html += '</li>';
  });
  html += '</ul>';
  html += '<p style="margin-top:12px;color:#8B7355;font-size:12px;">注：Penta 是 BG5 商业人类图团队合图分析的核心框架，由 Ra Uru Hu（1948–2011）创立的人类图体系衍生而来。Ra Uru Hu 于 1987 年接收人类图系统的完整信息，是 Human Design System 的创始人，其商业应用体系 BG5 由其弟子 Karen Curry Parker 等人进一步发展推广。6 大支柱通道的定义与天赋描述参考自《BG5 Business & Career Design》及人类图官方通道数据库（Jovian Archive / IHDS）。两人组合无法覆盖全部 6 大支柱，建议在完整团队中进行 Penta 合图分析。</p>';
  html += '</div></div>';

  document.getElementById('penta2Content').innerHTML = html;
}

// ========== Comprehensive Advice ==========
function renderAdvice(nameA, nameB, typeA, typeB, profileA, profileB, defA, defB, authA, authB) {
  const tA = TYPE_NAMES[typeA];
  const tB = TYPE_NAMES[typeB];
  let html = `<div class="interaction-card">
    <div class="ic-title">📋 ${nameA} × ${nameB} 综合互动建议</div>
    <div class="ic-body">
      <p><strong>1. 理解彼此的策略</strong><br>${tA}的策略是「${getStrategy(typeA)}」，${tB}的策略是「${getStrategy(typeB)}」。在互动中，先确认对方的策略是否被尊重。</p>
      <p style="margin-top:10px"><strong>2. 决策方式协调</strong><br>${nameA}的权威是${AUTHORITY_NAMES[authA]}，${nameB}的权威是${AUTHORITY_NAMES[authB]}。重要决定给彼此足够的时间按自己的权威清晰。</p>
      <p style="margin-top:10px"><strong>3. 能量节奏同步</strong><br>${nameA}是${DEFINITION_NAMES[defA]}，${nameB}是${DEFINITION_NAMES[defB]}。理解彼此能量流动的差异，避免用自己的节奏要求对方。</p>
      <p style="margin-top:10px"><strong>4. 人生角色互补</strong><br>${PROFILE_NAMES[profileA]} 与 ${PROFILE_NAMES[profileB]} 的组合，注意彼此的核心需求（${PROFILE_INTERACTION[profileA]?.needs || '—'} vs ${PROFILE_INTERACTION[profileB]?.needs || '—'}），在互动中互相满足。</p>
      <p style="margin-top:10px;color:#C4956A;"><strong>💡 核心心法</strong>：差异不是问题，不理解差异才是问题。BG5 双人合图分析的目的不是改变对方，而是理解彼此的能量蓝图，找到最优协作方式。</p>
    </div>

  document.getElementById('adviceContent').innerHTML = html;
}

function getStrategy(type) {
  const s = { generator:'等待回应', manifesting_generator:'等待回应', projector:'等待邀请', manifestor:'告知', reflector:'等待月亮周期' };
  return s[type] || '—';
}
