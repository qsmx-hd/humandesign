<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人类图肯定语 · 能量抽卡 | Human Design Affirmation Cards</title>
<style>
:root {
  --bg: #F5F0E8;
  --card-bg: #FDF9F2;
  --gold: #C4956A;
  --dark: #2D2118;
  --border: #E8DCC8;
  --text: #3A2A1A;
  --text-light: #6B5D4F;
  --accent: #D4A574;
  --shadow: 0 4px 20px rgba(45,33,24,0.12);
  --shadow-lg: 0 8px 40px rgba(45,33,24,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ── Background Pattern ── */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(196,149,106,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(196,149,106,0.04) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(196,149,106,0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 24px 40px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 30px 0 10px;
}

.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--dark);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.header .subtitle {
  font-size: 14px;
  color: var(--text-light);
  letter-spacing: 1px;
  font-weight: 400;
}

.header .version-badge {
  display: inline-block;
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-light);
  border: 1px solid var(--border);
  padding: 2px 10px;
  border-radius: 20px;
  letter-spacing: 1px;
}

/* ── Main Card Area ── */
.card-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px 0 30px;
  min-height: 420px;
  justify-content: center;
}

/* ── Deck Display ── */
.deck-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.deck-visual {
  position: relative;
  width: 260px;
  height: 360px;
  cursor: pointer;
  transition: transform 0.3s;
}

.deck-visual:hover {
  transform: translateY(-4px);
}

.deck-visual:active {
  transform: scale(0.97);
}

.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.deck-card:nth-child(1) {
  background: linear-gradient(145deg, #C4956A 0%, #A67B55 100%);
  top: 0; left: 0;
  z-index: 3;
  box-shadow: var(--shadow-lg);
}

.deck-card:nth-child(2) {
  background: linear-gradient(145deg, #D4A574 0%, #B88560 100%);
  top: 6px; left: 6px;
  z-index: 2;
  box-shadow: var(--shadow);
}

.deck-card:nth-child(3) {
  background: linear-gradient(145deg, #E0B88A 0%, #C89570 100%);
  top: 12px; left: 12px;
  z-index: 1;
}

.deck-card-front {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #C4956A 0%, #A67B55 100%);
  border: 3px solid rgba(255,255,255,0.25);
}

.deck-card-front .deck-icon {
  font-size: 56px;
  margin-bottom: 16px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.deck-card-front .deck-label {
  font-size: 18px;
  font-weight: 700;
  color: #FFF;
  letter-spacing: 3px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.deck-card-front .deck-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 2px;
  margin-top: 8px;
}

/* ── Draw Button ── */
.draw-hint {
  font-size: 14px;
  color: var(--text-light);
  text-align: center;
  letter-spacing: 1px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* ── Result Card ── */
.result-card {
  width: 100%;
  max-width: 520px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: var(--shadow-lg);
  border: 2px solid var(--border);
  position: relative;
  animation: cardReveal 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes cardReveal {
  0% { opacity: 0; transform: translateY(30px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.result-card .gate-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #2D2118 0%, #4A3828 100%);
  color: #FFF;
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 20px;
}

.result-card .gate-badge .gate-num {
  font-size: 20px;
  font-weight: 800;
  color: var(--gold);
}

.result-card .gate-name {
  font-size: 24px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.result-card .gate-iching {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.result-card .affirmation-label {
  display: inline-block;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 2px;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.result-card .affirmation-text {
  font-size: 18px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.6;
  padding: 20px 24px;
  background: linear-gradient(135deg, rgba(196,149,106,0.08), rgba(196,149,106,0.03));
  border-left: 4px solid var(--gold);
  border-radius: 0 12px 12px 0;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

.result-card .gate-center {
  display: inline-block;
  font-size: 13px;
  color: var(--text-light);
  background: #F5F0E8;
  padding: 6px 14px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.result-card .gate-description {
  font-size: 14px;
  color: var(--text-light);
  margin-top: 16px;
  line-height: 1.6;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ── Action Buttons ── */
.action-buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  border: none;
  transition: all 0.25s;
  font-family: inherit;
}

.btn-draw {
  background: linear-gradient(135deg, #C4956A, #A67B55);
  color: #FFF;
  box-shadow: 0 4px 16px rgba(196,149,106,0.35);
}

.btn-draw:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(196,149,106,0.45);
}

.btn-draw:active {
  transform: scale(0.97);
}

.btn-outline {
  background: transparent;
  color: var(--gold);
  border: 2px solid var(--gold);
}

.btn-outline:hover {
  background: rgba(196,149,106,0.08);
}

.btn-text {
  background: transparent;
  color: var(--text-light);
  padding: 8px 16px;
  font-size: 13px;
}

/* ── History ── */
.history-section {
  margin-top: 40px;
}

.history-section h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  letter-spacing: 1px;
  margin-bottom: 16px;
  text-align: center;
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}

.history-header h3 {
  margin-bottom: 0;
}

.btn-clear {
  background: transparent;
  color: #c97a6a;
  border: 1px solid #e0c0b8;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 1px;
  font-family: inherit;
  transition: all 0.25s;
}

.btn-clear:hover {
  background: rgba(200, 100, 80, 0.08);
  border-color: #c97a6a;
}

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.history-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
}

.history-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: var(--gold);
}

.history-card .h-gate-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  line-height: 1;
}

.history-card .h-gate-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--dark);
  margin-top: 6px;
}

.history-card .h-time {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 4px;
}

/* ── Share Toast ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #2D2118;
  color: #FFF;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 14px;
  letter-spacing: 1px;
  z-index: 100;
  animation: toastIn 0.3s ease;
  pointer-events: none;
}

@keyframes toastIn {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-light);
  font-size: 14px;
}

/* ── Confetti ── */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 50;
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 3px;
  animation: confettiFall 1.8s ease-out forwards;
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(-100%) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* ── Footer ── */
.footer {
  text-align: center;
  margin-top: 50px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-light);
  letter-spacing: 1px;
}

/* ── Print ── */
@media print {
  body { background: white; }
  .btn, .deck-area, .draw-hint, .history-section, .footer, .action-buttons { display: none !important; }
  .result-card { box-shadow: none; border: 1px solid #ccc; }
  .card-stage { min-height: auto; }
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .container { padding: 12px 16px 30px; }
  .header h1 { font-size: 22px; }
  .result-card { padding: 24px 20px; }
  .result-card .affirmation-text { font-size: 16px; padding: 16px; }
  .history-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .deck-visual { width: 200px; height: 280px; }
}
</style>

//  State Management
// ═══════════════════════════════════════════
const STORAGE_KEY = 'hd-affirmation-history';
let history = [];

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) history = JSON.parse(saved);
  } catch(e) {
    history = [];
  }
}

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 64)));
  } catch(e) {}
}

function clearHistory() {
  if (history.length === 0) return;
  if (!confirm('确定要清空所有抽卡记录吗？此操作不可撤销。')) return;
  history = [];
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
  showToast('✅ 抽卡记录已清空');
}

function addToHistory(gateData) {
  const entry = {
    gate: gateData.gate,
    name: gateData.name,
    nameCN: gateData.nameCN,
    affirmation: gateData.affirmation,
    timestamp: new Date().toISOString()
  };
  // Remove if already exists, then prepend
  history = history.filter(h => h.gate !== entry.gate);
  history.unshift(entry);
  // Keep max 64
  if (history.length > 64) history = history.slice(0, 64);
  saveHistory();
  renderHistory();
}

// ═══════════════════════════════════════════
//  Card Draw Logic
// ═══════════════════════════════════════════
function drawCard() {
  const deckArea = document.getElementById('deckArea');
  const resultArea = document.getElementById('resultArea');

  // Random pick
  const idx = Math.floor(Math.random() * gatesData.length);
  const gate = gatesData[idx];

  // Confetti!
  spawnConfetti();

  // Hide deck, show result
  deckArea.style.display = 'none';
  resultArea.innerHTML = renderResultCard(gate);
  resultArea.style.display = 'block';

  // Add to history
  addToHistory(gate);

  // Scroll to result
  setTimeout(() => {
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function renderResultCard(gate) {
  return `
    <div class="result-card">
      <div class="gate-badge">
        <span class="gate-num">${gate.gate}</span>
        <span>${gate.iChing}</span>
      </div>
      <div class="gate-name">${gate.name} · ${gate.nameCN}</div>
      <div class="gate-iching">易经 ${gate.iChing}</div>
      <div class="affirmation-label">✦ 今日肯定语</div>
      <div class="affirmation-text">${gate.affirmation}</div>
      <span class="gate-center">${gate.center}</span>
      <div class="gate-description">${gate.description}</div>
      <div class="action-buttons">
        <button class="btn btn-draw" onclick="drawCard()">🎴 再抽一张</button>
        <button class="btn btn-outline" onclick="shareCard(${gate.gate})">📤 分享肯定语</button>
        <button class="btn btn-text" onclick="resetCards()">↩ 返回卡组</button>
      </div>
    </div>
  `;
}

function resetCards() {
  document.getElementById('deckArea').style.display = 'flex';
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('resultArea').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareCard(gateNum) {
  const gate = gatesData.find(g => g.gate === gateNum);
  if (!gate) return;
  const text = `🔮 人类图肯定语抽卡 · 第${gate.gate}闸门\n【${gate.name}·${gate.nameCN}】\n${gate.iChing}\n\n"${gate.affirmation}"\n\n—— 人类图肯定语能量抽卡 V4`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已复制肯定语到剪贴板，可以分享给朋友啦~');
    }).catch(() => {
      showToast('📋 分享文本：' + text.substring(0, 50) + '...');
    });
  } else {
    showToast('📋 分享文本已准备好，请手动复制');
  }
}

function renderHistory() {
  const grid = document.getElementById('historyGrid');
  const empty = document.getElementById('emptyHistory');
  const btnClear = document.getElementById('btnClear');
  if (history.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    btnClear.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  btnClear.style.display = 'inline-block';
  grid.innerHTML = history.map(h => {
    const d = new Date(h.timestamp);
    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="history-card" onclick="revisitCard(${h.gate})">
        <div class="h-gate-num">${h.gate}</div>
        <div class="h-gate-name">${h.name}·${h.nameCN}</div>
        <div class="h-time">${timeStr}</div>
      </div>
    `;
  }).join('');
}

function revisitCard(gateNum) {
  const gate = gatesData.find(g => g.gate === gateNum);
  if (!gate) return;
  const deckArea = document.getElementById('deckArea');
  const resultArea = document.getElementById('resultArea');
  deckArea.style.display = 'none';
  resultArea.innerHTML = renderResultCard(gate);
  resultArea.style.display = 'block';
  resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ═══════════════════════════════════════════
//  Confetti Animation
// ═══════════════════════════════════════════
function spawnConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#C4956A', '#D4A574', '#E8DCC8', '#A67B55', '#2D2118', '#F5D6A8', '#B88560'];
  const fragment = document.createDocumentFragment();
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 40 + 10) + 'px';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.6 + 's';
    piece.style.animationDuration = (Math.random() * 1.2 + 1.2) + 's';
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    fragment.appendChild(piece);
  }
  container.appendChild(fragment);
  setTimeout(() => {
    container.innerHTML = '';
  }, 2500);
}

// ═══════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
}

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadHistory();
  renderHistory();
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    const resultVisible = document.getElementById('resultArea').style.display !== 'none';
    if (resultVisible) {
      drawCard();
    } else {
      drawCard();
    }
  }
});
</script>
