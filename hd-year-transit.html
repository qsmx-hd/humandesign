<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #F5F0E8;
  --card-bg: #FDF9F2;
  --gold: #C4956A;
  --dark: #2D2118;
  --border: #E8DCC8;
  --text: #3A2A1A;
  --text-light: #6B5D4F;
  --accent: #D4A574;
  --shadow: 0 4px 20px rgba(45,33,24,0.12);
  --shadow-lg: 0 8px 40px rgba(45,33,24,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(196,149,106,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(196,149,106,0.04) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(196,149,106,0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 24px 40px;
  position: relative;
  z-index: 1;
}

.header {
  text-align: center;
  padding: 30px 0 10px;
}

.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--dark);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.header .subtitle {
  font-size: 14px;
  color: var(--text-light);
  letter-spacing: 1px;
  font-weight: 400;
}

.back-link {
  display: inline-block;
  margin-top: 12px;
  font-size: 13px;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold);
  padding: 4px 14px;
  border-radius: 20px;
  transition: all 0.3s ease;
}

.back-link:hover { background: var(--gold); color: white; }

/* Dimension Selector */
.dim-selector {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 20px 0;
  flex-wrap: wrap;
}

.dim-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}

.dim-btn:hover { border-color: var(--gold); }
.dim-btn.active {
  background: var(--gold);
  color: white;
  border-color: var(--gold);
}

/* Option Grid */
.option-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  margin: 16px 0;
}

.option-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
}

.option-btn:hover { border-color: var(--gold); transform: translateY(-2px); }
.option-btn.active {
  border-color: var(--gold);
  background: rgba(196,149,106,0.1);
  box-shadow: 0 0 0 2px rgba(196,149,106,0.2);
}

.option-btn .opt-icon { font-size: 24px; }
.option-btn .opt-name { font-size: 13px; }

/* Card Stage */
.card-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px 0 30px;
  min-height: 400px;
  justify-content: center;
}

.deck-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.deck-visual {
  position: relative;
  width: 260px;
  height: 360px;
  cursor: pointer;
  transition: transform 0.3s;
}

.deck-visual:hover { transform: translateY(-4px); }
.deck-visual:active { transform: scale(0.97); }

.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.deck-card:nth-child(1) {
  background: linear-gradient(145deg, #C4956A 0%, #A67B55 100%);
  top: 0; left: 0;
  z-index: 3;
  box-shadow: var(--shadow-lg);
}

.deck-card:nth-child(2) {
  background: linear-gradient(145deg, #D4A574 0%, #B88560 100%);
  top: 6px; left: 6px;
  z-index: 2;
  box-shadow: var(--shadow);
}

.deck-card:nth-child(3) {
  background: linear-gradient(145deg, #E0B88A 0%, #C89570 100%);
  top: 12px; left: 12px;
  z-index: 1;
}

.deck-card-front {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #C4956A 0%, #A67B55 100%);
  border: 3px solid rgba(255,255,255,0.25);
}

.deck-card-front .deck-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
.deck-card-front .deck-label { font-size: 18px; font-weight: 700; color: #FFF; letter-spacing: 3px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
.deck-card-front .deck-sub { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 2px; margin-top: 8px; }

.draw-hint {
  font-size: 14px;
  color: var(--text-light);
  text-align: center;
  letter-spacing: 1px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

/* Result Card */
.result-card {
  width: 100%;
  max-width: 520px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  animation: fadeInUp 0.5s ease;
  position: relative;
  overflow: hidden;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--gold);
}

.card-icon {
  font-size: 42px;
  text-align: center;
  margin-bottom: 8px;
}

.card-label {
  font-size: 13px;
  color: var(--gold);
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.card-divider {
  width: 60px;
  height: 2px;
  background: var(--gold);
  margin: 0 auto 20px;
  border-radius: 1px;
}

.card-affirmation {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
  text-align: center;
  padding: 0 8px;
  margin-bottom: 20px;
}

.card-guidance {
  background: rgba(196,149,106,0.08);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
}

.card-guidance-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.card-guidance-text {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

.card-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.action-btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}

.action-btn:hover { background: var(--bg); border-color: var(--gold); }
.action-btn.primary { background: var(--gold); color: white; border-color: var(--gold); }
.action-btn.primary:hover { background: var(--dark); }

.card-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-light);
  text-align: center;
  padding: 60px 20px;
}

.card-placeholder .ph-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

/* History */
.history-section {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px dashed var(--border);
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.history-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--dark);
  letter-spacing: 1px;
}

.history-clear {
  font-size: 12px;
  color: var(--text-light);
  background: none;
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}

.history-clear:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-item {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.history-item:hover {
  border-color: var(--gold);
  transform: translateX(4px);
}

.history-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  opacity: 0.6;
}

.history-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.history-item-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--dark);
}

.history-item-time {
  font-size: 11px;
  color: var(--text-light);
}

.history-item-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.history-empty {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-light);
  font-size: 13px;
}

footer {
  text-align: center;
  padding: 30px 0 20px;
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.8;
}

.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--dark);
  color: white;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1000;
  pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .header h1 { font-size: 22px; }
  .result-card { padding: 28px 20px; }
  .card-affirmation { font-size: 15px; }
  .option-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

  </div>

  <footer>
    人类图流年运势抽卡 · 基于人类图流年与行星过境<br>

  <div class="history-section" id="historySection" style="display:none;">

</div>

<div class="toast" id="toast"></div>

// ====== 状态 ======
let currentDim = 'year';
let currentSelection = null;

// ====== 维度切换 ======
function selectDim(dim) {
  currentDim = dim;
  currentSelection = null;

  document.querySelectorAll('.dim-btn').forEach(b => b.classList.toggle('active', b.dataset.dim === dim));
  renderSelector();
  resetCardStage();
}

function renderSelector() {
  const area = document.getElementById('selectorArea');
  let data, renderFn;

  switch (currentDim) {
    case 'year': data = yearThemes; renderFn = renderYearOptions; break;
    case 'season': data = seasonThemes; renderFn = renderSeasonOptions; break;
    case 'transit': data = transitThemes; renderFn = renderTransitOptions; break;
    case 'growth': data = growthThemes; renderFn = renderGrowthOptions; break;
  }

  area.innerHTML = '';
  renderFn(area, data);
}

function renderYearOptions(area, data) {
  let html = '<div class="option-grid">';
  for (const item of data) {
    const active = currentSelection === item.key ? 'active' : '';
    html += `<button class="option-btn ${active}" data-key="${item.key}" onclick="selectOption('${item.key}')">
      <span class="opt-icon">${item.icon}</span>
      <span class="opt-name">${item.name}</span>
    </button>`;
  }
  html += '</div>';
  area.innerHTML = html;
}

function renderSeasonOptions(area, data) {
  let html = '<div class="option-grid">';
  for (const item of data) {
    const active = currentSelection === item.key ? 'active' : '';
    html += `<button class="option-btn ${active}" data-key="${item.key}" onclick="selectOption('${item.key}')">
      <span class="opt-icon">${item.icon}</span>
      <span class="opt-name">${item.name}</span>
    </button>`;
  }
  html += '</div>';
  area.innerHTML = html;
}

function renderTransitOptions(area, data) {
  let html = '<div class="option-grid">';
  for (const item of data) {
    const active = currentSelection === item.key ? 'active' : '';
    html += `<button class="option-btn ${active}" data-key="${item.key}" onclick="selectOption('${item.key}')">
      <span class="opt-icon">${item.icon}</span>
      <span class="opt-name">${item.planet}</span>
    </button>`;
  }
  html += '</div>';
  area.innerHTML = html;
}

function renderGrowthOptions(area, data) {
  let html = '<div class="option-grid">';
  for (const item of data) {
    const active = currentSelection === item.key ? 'active' : '';
    html += `<button class="option-btn ${active}" data-key="${item.key}" onclick="selectOption('${item.key}')">
      <span class="opt-icon">${item.icon}</span>
      <span class="opt-name">${item.name}</span>
    </button>`;
  }
  html += '</div>';
  area.innerHTML = html;
}

function selectOption(key) {
  currentSelection = key;
  renderSelector();
  drawCard();
}

function resetCardStage() {
  document.getElementById('cardStage').innerHTML = `
    <div class="deck-area" id="deckArea">
      <div class="deck-visual" onclick="drawCard()">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card">
          <div class="deck-card-front">
            <div class="deck-icon">🌟</div>
            <div class="deck-label">流年运势</div>
            <div class="deck-sub">点击抽取</div>
          </div>
        </div>
      </div>
      <div class="draw-hint">选择维度后点击卡牌抽取流年指引</div>
    </div>
  `;
}

function drawCard() {
  if (!currentSelection) {
    showToast('请先选择一个主题');
    return;
  }

  let data;
  switch (currentDim) {
    case 'year': data = yearThemes; break;
    case 'season': data = seasonThemes; break;
    case 'transit': data = transitThemes; break;
    case 'growth': data = growthThemes; break;
  }

  const item = data.find(d => d.key === currentSelection);
  if (!item) return;

  const pool = item.affirmations;
  const affirmation = pool[Math.floor(Math.random() * pool.length)];
  currentCard = { ...item, text: affirmation, dim: currentDim };
  renderCard(currentCard);
  saveHistory(currentCard);
}

function renderCard(card) {
  const stage = document.getElementById('cardStage');
  let metaText = '';
  if (card.season) metaText = card.season;
  else if (card.planet) metaText = card.planet + '过境';

  stage.innerHTML = `
    <div class="result-card">
      <div class="card-icon">${card.icon}</div>
      <div class="card-label">${metaText}</div>
      <div class="card-title">${card.name}</div>
      <div class="card-divider"></div>
      <div class="card-affirmation">${card.text}</div>
      <div class="card-guidance">
        <div class="card-guidance-title">深度指引</div>
        <div class="card-guidance-text">${card.guidance}</div>
      </div>
      <div class="card-actions">
        <button class="action-btn" onclick="copyCard()">📋 复制文字</button>
        <button class="action-btn primary" onclick="drawCard()">🔄 再抽一张</button>
      </div>
    </div>
  `;
}

function copyCard() {
  if (!currentCard) return;
  const text = `🌟 ${currentCard.name}\n\n${currentCard.text}\n\n深度指引：${currentCard.guidance}`;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    showToast('复制失败，请手动选择文字');
  });
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ====== 抽卡记录 ======
const HISTORY_KEY = 'hd_year_transit_history';
const MAX_HISTORY = 20;

function saveHistory(card) {
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const record = {
    name: card.name,
    icon: card.icon,
    dim: card.dim,
    text: card.text,
    time: new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  };
  history.unshift(record);
  if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <div class="history-item-header">
        <span class="history-item-title">${item.icon} ${item.name}</span>
        <span class="history-item-time">${item.time}</span>
      </div>
      <div class="history-item-text">${item.text}</div>
    </div>
  `).join('');
}

function clearHistory() {
  if (!confirm('确定要清空所有抽卡记录吗？')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  showToast('已清空记录');
}

// ====== 初始化 ======
renderSelector();
renderHistory();
