<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人类图肯定语句 · 每日抽卡</title>
  <style>
    /* ========== 全局变量 ========== */
    :root {
      --bg-dark: #2D2118;
      --bg-card: #3A2D20;
      --bg-card-light: #4A3828;
      --gold: #C4956A;
      --gold-light: #D4A57E;
      --gold-dark: #A67C52;
      --text-primary: #F5E6D3;
      --text-secondary: #C4A882;
      --text-muted: #8A7560;
      --border: #5A4530;
      --shadow: rgba(0,0,0,0.4);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========== 背景装饰 ========== */
    .bg-decoration {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(circle at 20% 15%, rgba(196,149,106,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 85%, rgba(196,149,106,0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(196,149,106,0.03) 0%, transparent 70%);
    }

    /* ========== 容器 ========== */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      position: relative;
      z-index: 1;
    }

    /* ========== 头部 ========== */
    header {
      text-align: center;
      padding: 20px 0 28px;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    header .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    header .version {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 8px;
      opacity: 0.6;
    }

    /* ========== 维度选择栏 ========== */
    .dim-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 4px;
    }
    .dim-tab {
      flex: 1;
      padding: 10px 4px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      background: transparent;
      white-space: nowrap;
    }
    .dim-tab.active {
      background: var(--gold-dark);
      color: #fff;
      font-weight: 600;
    }
    .dim-tab:not(.active):hover {
      color: var(--gold-light);
      background: rgba(196,149,106,0.1);
    }

    /* ========== 选择区 ========== */
    .selector-area {
      margin-bottom: 20px;
    }
    .selector-area label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }
    .option-btn {
      padding: 12px 8px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }
    .option-btn .opt-icon {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .option-btn .opt-name {
      font-size: 0.75rem;
    }
    .option-btn.active {
      border-color: var(--gold);
      background: rgba(196,149,106,0.15);
      color: var(--gold-light);
    }
    .option-btn:hover:not(.active) {
      border-color: var(--gold-dark);
      color: var(--gold-light);
    }

    /* 中心状态切换 */
    .center-state-toggle {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .center-state-toggle button {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .center-state-toggle button.active {
      border-color: var(--gold);
      background: rgba(196,149,106,0.15);
      color: var(--gold-light);
    }

    /* 闸门网格 */
    .gate-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }
    .gate-btn {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .gate-btn.active {
      background: var(--gold-dark);
      color: #fff;
      border-color: var(--gold);
    }
    .gate-btn:hover:not(.active) {
      border-color: var(--gold-dark);
      color: var(--gold-light);
    }

    /* ========== 抽卡按钮 ========== */
    .draw-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(196,149,106,0.3);
    }
    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(196,149,106,0.4);
    }
    .draw-btn:active {
      transform: translateY(0);
    }
    .draw-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ========== 卡片展示区 ========== */
    .card-area {
      perspective: 1000px;
      margin-bottom: 24px;
    }
    .card-placeholder {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .card-placeholder .ph-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .affirmation-card {
      background: linear-gradient(145deg, var(--bg-card-light), var(--bg-card));
      border: 1.5px solid var(--gold-dark);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      position: relative;
      box-shadow: 0 8px 32px var(--shadow);
      animation: cardReveal 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardReveal {
      0% { opacity: 0; transform: rotateY(90deg) scale(0.8); }
      100% { opacity: 1; transform: rotateY(0) scale(1); }
    }

    .card-corner {
      position: absolute;
      width: 24px; height: 24px;
      border: 2px solid var(--gold);
      opacity: 0.4;
    }
    .card-corner.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
    .card-corner.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
    .card-corner.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
    .card-corner.br { bottom: 10px; right: 10px; border-left: none; border-top: none; border-radius: 0 0 6px 0; }

    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .card-title {
      font-size: 1.1rem;
      color: var(--gold-light);
      font-weight: 600;
      margin-bottom: 20px;
    }
    .card-divider {
      width: 40px;
      height: 1px;
      background: var(--gold-dark);
      margin: 0 auto 20px;
      opacity: 0.5;
    }
    .card-affirmation {
      font-size: 1.15rem;
      line-height: 1.8;
      color: var(--text-primary);
      font-weight: 500;
      letter-spacing: 1px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 20px;
      letter-spacing: 1px;
    }

    /* ========== 卡片操作按钮 ========== */
    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .action-btn {
      flex: 1;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .action-btn:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      background: rgba(196,149,106,0.1);
    }
    .action-btn.primary {
      background: rgba(196,149,106,0.15);
      border-color: var(--gold-dark);
      color: var(--gold-light);
    }

    /* ========== 历史记录 ========== */
    .history-section {
      margin-top: 28px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .history-header h3 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .history-header button {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }
    .history-header button:hover { color: var(--gold); }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .history-item .h-icon { font-size: 1.1rem; flex-shrink: 0; }
    .history-item .h-content { flex: 1; }
    .history-item .h-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .history-item .h-text {
      color: var(--text-primary);
      line-height: 1.5;
    }
    .history-empty {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* ========== 收藏列表 ========== */
    .fav-section { margin-top: 20px; }
    .fav-section h3 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card-light);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.85rem;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px var(--shadow);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ========== 底部 ========== */
    footer {
      text-align: center;
      padding: 24px 0 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 480px) {
      header h1 { font-size: 1.4rem; }
      .gate-grid { grid-template-columns: repeat(6, 1fr); }
      .option-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
      .card-affirmation { font-size: 1.05rem; }
    }

    /* 打印样式 */
    @media print {
      body { background: #fff; color: #000; }
      .dim-tabs, .selector-area, .draw-btn, .card-actions, .history-section, .fav-section, .bg-decoration { display: none !important; }
      .affirmation-card { border: 2px solid #C4956A; box-shadow: none; }
      .card-affirmation { color: #2D2118; }
    }
  </style>
</head>

    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <!-- ========== 逻辑 ========== -->
  <script>
    // ========== 状态管理 ==========
    let currentDim = 'type';
    let currentSelection = null;
    let currentCard = null;

    // ========== 维度配置 ==========
    const dimConfig = {
      type: {
        label: '选择你的类型',
        data: typeAffirmations,
        renderOptions: () => renderTypeOptions()
      },
      authority: {
        label: '选择你的权威',
        data: authorityAffirmations,
        renderOptions: () => renderAuthorityOptions()
      },
      center: {
        label: '选择中心与状态',
        data: centerAffirmations,
        renderOptions: () => renderCenterOptions()
      },
      gate: {
        label: '选择闸门（1-64）',
        data: gateAffirmations,
        renderOptions: () => renderGateOptions()
      }
    };

    // ========== 渲染选择区 ==========
    function renderSelector() {
      const area = document.getElementById('selectorArea');
      const config = dimConfig[currentDim];
      area.innerHTML = `<label>${config.label}</label>`;
      config.renderOptions();
    }

    function renderTypeOptions() {
      const area = document.getElementById('selectorArea');
      let html = '<div class="option-grid">';
      for (const [key, val] of Object.entries(typeAffirmations)) {
        const active = currentSelection === key ? 'active' : '';
        html += `<button class="option-btn ${active}" data-key="${key}" onclick="selectOption('${key}')">
          <span class="opt-icon">${val.icon}</span>
          <span class="opt-name">${val.name}</span>
        </button>`;
      }
      html += '</div>';
      area.insertAdjacentHTML('beforeend', html);
    }

    function renderAuthorityOptions() {
      const area = document.getElementById('selectorArea');
      let html = '<div class="option-grid">';
      for (const [key, val] of Object.entries(authorityAffirmations)) {
        const active = currentSelection === key ? 'active' : '';
        html += `<button class="option-btn ${active}" data-key="${key}" onclick="selectOption('${key}')">
          <span class="opt-icon">${val.icon}</span>
          <span class="opt-name">${val.name}</span>
        </button>`;
      }
      html += '</div>';
      area.insertAdjacentHTML('beforeend', html);
    }

    function renderCenterOptions() {
      const area = document.getElementById('selectorArea');
      // 默认选中已定义
      if (!currentSelection) currentSelection = { center: 'head', state: 'defined' };
      let html = '<div class="option-grid">';
      for (const [key, val] of Object.entries(centerAffirmations)) {
        const active = currentSelection.center === key ? 'active' : '';
        html += `<button class="option-btn ${active}" data-key="${key}" onclick="selectCenter('${key}')">
          <span class="opt-icon">${val.icon}</span>
          <span class="opt-name">${val.name}</span>
        </button>`;
      }
      html += '</div>';
      // 状态切换
      html += `<div class="center-state-toggle">
        <button class="${currentSelection.state === 'defined' ? 'active' : ''}" onclick="selectCenterState('defined')">已定义</button>
        <button class="${currentSelection.state === 'undefined' ? 'active' : ''}" onclick="selectCenterState('undefined')">未定义</button>
      </div>`;
      area.insertAdjacentHTML('beforeend', html);
    }

    function renderGateOptions() {
      const area = document.getElementById('selectorArea');
      let html = '<div class="gate-grid">';
      for (let i = 1; i <= 64; i++) {
        const val = gateAffirmations[i];
        const active = currentSelection === String(i) ? 'active' : '';
        html += `<button class="gate-btn ${active}" onclick="selectOption('${i}')">${i}</button>`;
      }
      html += '</div>';
      // 显示选中闸门信息
      if (currentSelection && gateAffirmations[currentSelection]) {
        const g = gateAffirmations[currentSelection];
        html += `<div style="margin-top:12px; padding:12px; background:var(--bg-card); border-radius:10px; font-size:0.82rem; color:var(--text-secondary);">
          <span style="color:var(--gold);">闸门 ${currentSelection}</span> · ${g.name} · ${g.hexagram} · ${g.center}
        </div>`;
      }
      area.insertAdjacentHTML('beforeend', html);
    }

    // ========== 选择操作 ==========
    function selectOption(key) {
      currentSelection = key;
      renderSelector();
    }

    function selectCenter(key) {
      if (!currentSelection || typeof currentSelection === 'string') {
        currentSelection = { center: key, state: 'defined' };
      } else {
        currentSelection.center = key;
      }
      renderSelector();
    }

    function selectCenterState(state) {
      if (!currentSelection || typeof currentSelection === 'string') {
        currentSelection = { center: 'head', state: state };
      } else {
        currentSelection.state = state;
      }
      renderSelector();
    }

    // ========== 维度切换 ==========
    document.querySelectorAll('.dim-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.dim-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentDim = tab.dataset.dim;
        currentSelection = null;
        if (currentDim === 'center') currentSelection = { center: 'head', state: 'defined' };
        renderSelector();
        resetCardArea();
      });
    });

    // ========== 抽卡 ==========
    function drawCard() {
      let pool = [];
      let cardInfo = {};

      if (currentDim === 'type') {
        if (!currentSelection) { showToast('请先选择类型'); return; }
        const data = typeAffirmations[currentSelection];
        pool = data.affirmations;
        cardInfo = { icon: data.icon, label: '类型', title: data.name, meta: data.nameEn };
      } else if (currentDim === 'authority') {
        if (!currentSelection) { showToast('请先选择权威'); return; }
        const data = authorityAffirmations[currentSelection];
        pool = data.affirmations;
        cardInfo = { icon: data.icon, label: '权威', title: data.name, meta: data.nameEn };
      } else if (currentDim === 'center') {
        if (!currentSelection) { showToast('请先选择中心'); return; }
        const data = centerAffirmations[currentSelection.center];
        const stateLabel = currentSelection.state === 'defined' ? '已定义' : '未定义';
        pool = currentSelection.state === 'defined' ? data.defined : data.undefined;
        cardInfo = { icon: data.icon, label: stateLabel + '中心', title: data.name, meta: data.nameEn };
      } else if (currentDim === 'gate') {
        if (!currentSelection) { showToast('请先选择闸门'); return; }
        const gateNum = Number(currentSelection);
        if (!gateAffirmations[gateNum]) { showToast('无效闸门'); return; }
        const data = gateAffirmations[gateNum];
        pool = data.affirmations;
        cardInfo = { icon: '🚪', label: '闸门 ' + currentSelection, title: data.name, meta: data.hexagram + ' · ' + data.center };
      }

      // 随机抽取
      const affirmation = pool[Math.floor(Math.random() * pool.length)];
      currentCard = { ...cardInfo, text: affirmation, dim: currentDim, selection: currentSelection };

      // 渲染卡片
      renderCard(currentCard);

      // 保存历史
      saveHistory(currentCard);

      // 检查是否已收藏
      updateFavButton();
    }

    function renderCard(card) {
      const area = document.getElementById('cardArea');
      area.innerHTML = `
        <div class="affirmation-card">
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
          <div class="card-icon">${card.icon}</div>
          <div class="card-label">${card.label}</div>
          <div class="card-title">${card.title}</div>
          <div class="card-divider"></div>
          <div class="card-affirmation">${card.text}</div>
          <div class="card-meta">${card.meta}</div>
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="copyCard()">📋 复制文字</button>
          <button class="action-btn primary" id="favBtn" onclick="toggleFav()">⭐ 收藏</button>
          <button class="action-btn" onclick="drawCard()">🔄 再抽一张</button>
        </div>
      `;
    }

    function resetCardArea() {
      document.getElementById('cardArea').innerHTML = `
        <div class="card-placeholder">
          <div class="ph-icon">🃏</div>
          <div>选择维度后点击上方按钮抽取卡牌</div>
        </div>
      `;
    }

    // ========== 复制 ==========
    function copyCard() {
      if (!currentCard) return;
      const text = `${currentCard.text}\n\n—— ${currentCard.label} · ${currentCard.title}`;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
      }).catch(() => {
        showToast('复制失败，请手动选择文字');
      });
    }

    // ========== 收藏 ==========
    function getFavs() {
      try { return JSON.parse(localStorage.getItem('hd_favs') || '[]'); }
      catch(e) { return []; }
    }

    function toggleFav() {
      if (!currentCard) return;
      const favs = getFavs();
      const cardId = JSON.stringify({ dim: currentCard.dim, selection: currentCard.selection, text: currentCard.text });
      const existIdx = favs.findIndex(f => JSON.stringify({ dim: f.dim, selection: f.selection, text: f.text }) === cardId);

      if (existIdx >= 0) {
        favs.splice(existIdx, 1);
        showToast('已取消收藏');
      } else {
        favs.unshift({ ...currentCard, time: Date.now() });
        showToast('已加入收藏 ⭐');
      }
      localStorage.setItem('hd_favs', JSON.stringify(favs));
      renderFavs();
      updateFavButton();
    }

    function updateFavButton() {
      const btn = document.getElementById('favBtn');
      if (!btn || !currentCard) return;
      const favs = getFavs();
      const isFav = favs.some(f =>
        f.dim === currentCard.dim &&
        JSON.stringify(f.selection) === JSON.stringify(currentCard.selection) &&
        f.text === currentCard.text
      );
      btn.innerHTML = isFav ? '✅ 已收藏' : '⭐ 收藏';
    }

    function renderFavs() {
      const favs = getFavs();
      const section = document.getElementById('favSection');
      const list = document.getElementById('favList');
      if (favs.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      list.innerHTML = favs.map((f, i) => `
        <div class="history-item">
          <span class="h-icon">${f.icon}</span>
          <div class="h-content">
            <div class="h-meta">${f.label} · ${f.title} · ${f.meta}</div>
            <div class="h-text">${f.text}</div>
          </div>
          <button onclick="removeFav(${i})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:4px;">✕</button>
        </div>
      `).join('');
    }

    function removeFav(idx) {
      const favs = getFavs();
      favs.splice(idx, 1);
      localStorage.setItem('hd_favs', JSON.stringify(favs));
      renderFavs();
      updateFavButton();
      showToast('已移除');
    }

    // ========== 历史记录 ==========
    function getHistory() {
      try { return JSON.parse(localStorage.getItem('hd_history') || '[]'); }
      catch(e) { return []; }
    }

    function saveHistory(card) {
      let history = getHistory();
      history.unshift({ ...card, time: Date.now() });
      if (history.length > 50) history = history.slice(0, 50);
      localStorage.setItem('hd_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const history = getHistory();
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<div class="history-empty">暂无记录，开始抽卡吧</div>';
        return;
      }
      list.innerHTML = history.map(h => {
        const time = new Date(h.time);
        const timeStr = `${time.getMonth()+1}/${time.getDate()} ${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
        return `
          <div class="history-item">
            <span class="h-icon">${h.icon}</span>
            <div class="h-content">
              <div class="h-meta">${timeStr} · ${h.label} · ${h.title}</div>
              <div class="h-text">${h.text}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function clearHistory() {
      if (!confirm('确定清空所有抽卡记录？')) return;
      localStorage.removeItem('hd_history');
      renderHistory();
      showToast('已清空记录');
    }

    // ========== Toast ==========
    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ========== 初始化 ==========
    renderSelector();
    renderHistory();
    renderFavs();
  </script>
</body>
</html>
