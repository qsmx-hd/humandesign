<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人类图 · 月亮周期抽卡 | Human Design Moon Cycle</title>
<style>
:root {
  --bg: #F5F0E8;
  --card-bg: #FDF9F2;
  --gold: #C4956A;
  --dark: #2D2118;
  --border: #E8DCC8;
  --text: #3A2A1A;
  --text-light: #6B5D4F;
  --accent: #D4A574;
  --shadow: 0 4px 20px rgba(45,33,24,0.12);
  --shadow-lg: 0 8px 40px rgba(45,33,24,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(196,149,106,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(196,149,106,0.04) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(196,149,106,0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 24px 40px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 0 10px;
}

.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--dark);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.header .subtitle {
  font-size: 14px;
  color: var(--text-light);
  letter-spacing: 1px;
  font-weight: 400;
}

.back-link {
  display: inline-block;
  margin-top: 12px;
  font-size: 13px;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold);
  padding: 4px 14px;
  border-radius: 20px;
  transition: all 0.3s ease;
}

.back-link:hover {
  background: var(--gold);
  color: white;
}

/* Moon Phase Indicator */
.moon-phase-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 20px 0 10px;
  flex-wrap: wrap;
}

.moon-phase-item {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: var(--card-bg);
  border: 2px solid var(--border);
  transition: all 0.3s ease;
  cursor: default;
}

.moon-phase-item.active {
  border-color: var(--gold);
  background: rgba(196,149,106,0.1);
  transform: scale(1.15);
}

.moon-phase-label {
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 20px;
}

/* Card Stage */
.card-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px 0 30px;
  min-height: 400px;
  justify-content: center;
}

/* Deck */
.deck-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.deck-visual {
  position: relative;
  width: 260px;
  height: 360px;
  cursor: pointer;
  transition: transform 0.3s;
}

.deck-visual:hover { transform: translateY(-4px); }
.deck-visual:active { transform: scale(0.97); }

.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.deck-card:nth-child(1) {
  background: linear-gradient(145deg, #C4956A 0%, #A67B55 100%);
  top: 0; left: 0;
  z-index: 3;
  box-shadow: var(--shadow-lg);
}

.deck-card:nth-child(2) {
  background: linear-gradient(145deg, #D4A574 0%, #B88560 100%);
  top: 6px; left: 6px;
  z-index: 2;
  box-shadow: var(--shadow);
}

.deck-card:nth-child(3) {
  background: linear-gradient(145deg, #E0B88A 0%, #C89570 100%);
  top: 12px; left: 12px;
  z-index: 1;
}

.deck-card-front {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #C4956A 0%, #A67B55 100%);
  border: 3px solid rgba(255,255,255,0.25);
}

.deck-card-front .deck-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
.deck-card-front .deck-label { font-size: 18px; font-weight: 700; color: #FFF; letter-spacing: 3px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
.deck-card-front .deck-sub { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 2px; margin-top: 8px; }

.draw-hint {
  font-size: 14px;
  color: var(--text-light);
  text-align: center;
  letter-spacing: 1px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

/* Result Card */
.result-card {
  width: 100%;
  max-width: 520px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  animation: fadeInUp 0.5s ease;
  position: relative;
  overflow: hidden;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--gold);
}

.card-moon-icon {
  font-size: 48px;
  text-align: center;
  margin-bottom: 12px;
}

.card-phase-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.card-phase-day {
  font-size: 13px;
  color: var(--text-light);
  text-align: center;
  margin-bottom: 16px;
}

.card-divider {
  width: 60px;
  height: 2px;
  background: var(--gold);
  margin: 0 auto 20px;
  border-radius: 1px;
}

.card-theme {
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.card-affirmation {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
  text-align: center;
  padding: 0 8px;
  margin-bottom: 20px;
}

.card-energy {
  background: rgba(196,149,106,0.08);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
}

.card-energy-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.card-energy-text {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

.card-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.action-btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}

.action-btn:hover { background: var(--bg); border-color: var(--gold); }
.action-btn.primary { background: var(--gold); color: white; border-color: var(--gold); }
.action-btn.primary:hover { background: var(--dark); }

/* Placeholder */
.card-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-light);
  text-align: center;
  padding: 60px 20px;
}

.card-placeholder .ph-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

/* History */
.history-section {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px dashed var(--border);
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.history-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--dark);
  letter-spacing: 1px;
}

.history-clear {

  color: var(--text-light);

  border: 1px solid var(--border);

  border-radius: 20px;

  transition: all 0.3s ease;

.history-clear:hover {
  border-color: var(--gold);

.history-list {

  flex-direction: column;

.history-item {

  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;

  position: relative;

.history-item:hover {

.history-item-header {

  margin-bottom: 6px;

.history-item-title {

  font-weight: 600;
  color: var(--dark);
}

.history-item-time {
  font-size: 11px;
  color: var(--text-light);
}

.history-item-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;

  -webkit-line-clamp: 2;

.history-empty {

  padding: 30px 20px;
  color: var(--text-light);
  font-size: 13px;
}
footer {
  text-align: center;
  padding: 30px 0 20px;
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.8;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--dark);
  color: white;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1000;
  pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .header h1 { font-size: 22px; }
  .result-card { padding: 28px 20px; }
  .card-affirmation { font-size: 15px; }
  .moon-phase-item { width: 30px; height: 30px; font-size: 14px; }
}
</style>
</head>

// ====== 计算当前月相 ======
function getMoonPhase(date) {
  const synodic = 29.53058867;
  const knownNewMoon = new Date(2000, 0, 6, 18, 14, 0);
  const diff = date.getTime() - knownNewMoon.getTime();
  const days = diff / (1000 * 60 * 60 * 24);
  const age = ((days % synodic) + synodic) % synodic;

  if (age < 3.5) return 0;
  if (age < 7.5) return 1;
  if (age < 10.5) return 2;
  if (age < 14.5) return 3;
  if (age < 17.5) return 4;
  if (age < 21.5) return 5;
  if (age < 25.5) return 6;
  return 7;
}

  const label = document.getElementById('moonPhaseLabel');

  bar.innerHTML = moonPhases.map((phase, i) =>
    `<div class="moon-phase-item ${i === currentPhase ? 'active' : ''}" title="${phase.name} ${phase.days}">${phase.emoji}</div>`
  ).join('');

  const phase = moonPhases[currentPhase];
  label.innerHTML = `今日是 <strong>${phase.name}</strong> ${phase.days} · ${phase.theme}`;
}

// ====== 抽卡 ======
let currentCard = null;
let currentPhase = null;

function drawCard() {
  const today = new Date();
  const phaseIndex = getMoonPhase(today);
  currentPhase = moonPhases[phaseIndex];

  const pool = currentPhase.affirmations;
  const affirmation = pool[Math.floor(Math.random() * pool.length)];

  currentCard = { ...currentPhase, text: affirmation };
  renderCard(currentCard);
  saveHistory(currentCard);
}

function renderCard(card) {
  const stage = document.getElementById('cardStage');
  stage.innerHTML = `
    <div class="result-card">
      <div class="card-moon-icon">${card.emoji}</div>
      <div class="card-phase-name">${card.name}</div>
      <div class="card-phase-day">${card.days} · ${card.theme}</div>
      <div class="card-divider"></div>
      <div class="card-affirmation">${card.text}</div>
      <div class="card-energy">
        <div class="card-energy-title">能量指引</div>
        <div class="card-energy-text">${card.energy}</div>
      </div>
      <div class="card-actions">
        <button class="action-btn" onclick="copyCard()">📋 复制文字</button>
        <button class="action-btn primary" onclick="drawCard()">🔄 再抽一张</button>
      </div>
    </div>
  `;
}

function copyCard() {
  if (!currentCard) return;
  const text = `🌙 ${currentCard.name} · ${currentCard.theme}\n\n${currentCard.text}\n\n能量指引：${currentCard.energy}`;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  }).catch(() => {
    showToast('复制失败，请手动选择文字');
  });
}

// Toast
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ====== 抽卡记录 ======
const HISTORY_KEY = 'hd_moon_cycle_history';
const MAX_HISTORY = 20;

function saveHistory(card) {
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const record = {
    name: card.name,
    emoji: card.emoji,
    theme: card.theme,
    text: card.text,
    time: new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
  };
  history.unshift(record);
  if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <div class="history-item-header">
        <span class="history-item-title">${item.emoji} ${item.name} · ${item.theme}</span>
        <span class="history-item-time">${item.time}</span>
      </div>
      <div class="history-item-text">${item.text}</div>
    </div>
  `).join('');
}

function clearHistory() {
  if (!confirm('确定要清空所有抽卡记录吗？')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  showToast('已清空记录');
}

// ====== 初始化 ======
renderMoonPhaseBar();
renderHistory();
</script>
