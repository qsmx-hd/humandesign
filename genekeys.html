      SEQ_DESCRIPTIONS.pearl.nodes.forEach(function(n) {
        var arr = n.idx === "P" ? personalityGK : designGK;
        html += nodeCard(getNode(arr, n.i), n.roleCN, n.roleEN, n.lineNote);
      });
      html += '</div></div>';
      console.log("[RPR] Step 8: 珍珠序列渲染完成");
    } catch(e) { throw new Error("Step 8 珍珠序列: " + e.message); }

    // 星珍珠序列
    try {
      html += '<div class="sequence-section seq-starpearl"><div class="sequence-title">🟣 星珍珠（星纪）· Star Pearl Sequence</div>';
      html += '<div style="font-size:11px;color:var(--muted);margin:-6px 0 10px;padding-left:4px;">' + SEQ_DESCRIPTIONS.starpearl.desc + '</div>';
      html += '<div class="seq-grid starpearl-grid">';
      SEQ_DESCRIPTIONS.starpearl.nodes.forEach(function(n) {
        var arr = n.idx === "P" ? personalityGK : designGK;
        html += nodeCard(getNode(arr, n.i), n.roleCN, n.roleEN, n.lineNote);
      });
      html += '</div></div>';
      console.log("[RPR] Step 9: 星珍珠序列渲染完成");
    } catch(e) { throw new Error("Step 9 星珍珠序列: " + e.message); }

    // 行星数据表
    try {
      var HD_ORDER_P = [0, 11, 1, 10, 13, 2, 3, 4, 5, 6, 7, 8, 9];
      function planetRow(gk, cls, label, houseNum) {
        var p = gk.planet || {};
        var pn = p.name || "?";
        var glyph = GLYPH_MAP[pn] || "●";
        var gkNum = gk.geneKey;
        var pos = p.position || {};
        var certSign = signFromPosition(pos.location || 0);
        var deg = pos.degrees || 0;
        var min = pos.minutes || 0;
        var sec = Math.round(pos.seconds || 0);
        var displayName = label || pn;
        return '<tr class="' + cls + '"><td class="pl-glyph">' + glyph + '</td><td class="pl-name">' + displayName + '</td><td class="pl-gate" onclick="highlightGeneKeyOnMandala(\'' + gkNum + '\');closeProfileModal();">' + gkNum + '</td><td class="pl-pos">' + deg + '°' + (min < 10 ? "0" : "") + min + '\'' + (sec < 10 ? "0" : "") + sec + '"</td><td class="pl-sign">' + certSign + '</td><td class="pl-house">' + houseNum + '</td></tr>';
      }

      html += '<div class="planet-section-title print-page-break">🌌 行星数据表 <span style="font-size:12px;color:var(--muted);font-weight:400;">（HD标准排序 · 星座由黄经精确推算 · 点击闸门查看频率密码）</span></div>';

      var HD_NAME_MAP = { "Sun": "太阳", "Earth": "地球", "Moon": "月亮", "true Node": "北交", "south Node": "南交", "Mercury": "水星", "Venus": "金星", "Mars": "火星", "Jupiter": "木星", "Saturn": "土星", "Uranus": "天王星", "Neptune": "海王星", "Pluto": "冥王星" };
      var th = '<tr><th></th><th>行星</th><th>闸门·爻线</th><th>位置</th><th>星座</th><th>宫位</th></tr>';

      // 宫位计算
      var houseMap = {};
      if (currentHouses && currentHouses.houses) {
        [personalityGK, designGK].forEach(function(arr) {
          if (!arr || !Array.isArray(arr)) return;
          arr.forEach(function(gk) {
            if (!gk || !gk.planet || !gk.planet.position) return;
            var loc = ((gk.planet.position.location || 0) + 60) % 360;
            houseMap[gk.planet.name + "_" + (gk.planet.position.location || 0)] = getHouseNr(loc, currentHouses);
          });
        });
      }
      function getHn(gk) {
        var pn = (gk && gk.planet && gk.planet.name) || "";
        var loc = (gk && gk.planet && gk.planet.position && gk.planet.position.location) || 0;
        var key = pn + "_" + loc;
        return houseMap[key] || (currentHouses ? "?" : "-");
      }

      // Personality 表格
      console.log("[RPR] Step 10: 开始Personality表格, personalityGK长度=" + personalityGK.length);
      var sortedP = HD_ORDER_P.map(function(idx) { return personalityGK[idx]; });
      html += '<div style="font-size:12px;font-weight:600;color:#222;margin:8px 0 4px;">🌟 Personality · 意识行星</div>';
      html += '<table class="planet-table"><thead>' + th + '</thead><tbody>';
      sortedP.forEach(function(gk, i) {
        if (!gk) return;
        try { html += planetRow(gk, 'p-row', null, getHn(gk)); }
        catch(e) { console.error("[RPR] planetRow P error at i=" + i, e); html += '<tr><td colspan="6" style="color:red;">行星数据错误: ' + (e.message || e) + '</td></tr>'; }
      });
      html += '</tbody></table>';

      // Design 表格
      console.log("[RPR] Step 11: 开始Design表格, designGK长度=" + designGK.length);
      var sortedD = HD_ORDER_P.map(function(idx) { return designGK[idx]; });
      html += '<div class="print-page-break" style="font-size:12px;font-weight:600;color:#B54545;margin:14px 0 4px;">🔮 Design · 潜意识行星</div>';
      html += '<table class="planet-table"><thead>' + th + '</thead><tbody>';
      sortedD.forEach(function(gk, i) {
        if (!gk) return;
        var pn = (gk && gk.planet && gk.planet.name) || "";
        var cnLabel = HD_NAME_MAP[pn] || pn;
        try { html += planetRow(gk, 'd-row', cnLabel, getHn(gk)); }
        catch(e) { console.error("[RPR] planetRow D error at i=" + i, e); html += '<tr><td colspan="6" style="color:red;">行星数据错误: ' + (e.message || e) + '</td></tr>'; }
      });
      html += '</tbody></table>';
      console.log("[RPR] Step 12: 行星表格渲染完成");
    } catch(e) { throw new Error("Step 10-12 行星表格: " + e.message); }

    // 宫位说明底部
    try {
      if (currentHouses) {
        html += '<div class="house-note-print-bottom" style="margin:10px 0 0;padding:10px 14px;background:#F8F5FF;border-radius:8px;border:1px solid rgba(140,95,191,.15);font-size:13px;color:var(--muted);">';
        html += '<b>💡 精确Placidus宫位系统（semi-arc迭代法，精度±1°）</b><br>';
        html += '上升点(ASC): ' + zodiacSignDMS(currentHouses.ascendant) + ' (' + currentHouses.ascendant.toFixed(2) + '°)<br>';
        html += '中天(MC): ' + zodiacSignDMS(currentHouses.mc) + ' (' + currentHouses.mc.toFixed(2) + '°)<br>';
        html += '黄赤交角: ' + currentHouses.eps.toFixed(5) + '° &nbsp;|&nbsp; RAMC: ' + currentHouses.ramc.toFixed(2) + '°<br>';
        html += '算法：基于黄赤交角/半弧的牛顿迭代法，与Swiss Ephemeris一致。第2-6宫(地下)、第8-12宫(地上)。</div>';
      } else {
        html += '<div class="house-note-print-bottom" style="margin:10px 0 0;padding:10px 14px;background:#FFF8F0;border-radius:8px;border:1px solid var(--gold-light);font-size:13px;color:var(--muted);">💡 <b>关于宫位</b>：Placidus宫位计算需要城市经纬度数据。若城市不在数据库中，将不显示宫位信息。<br>当前支持的出生城市：Beijing, Shanghai, Guangzhou, Shenzhen, Chengdu, Hangzhou, Nanjing, Wuhan, Xi\'an, Chongqing, Hong Kong, Taipei, New York, London, Tokyo, Paris, Sydney, Singapore</div>';
      }
      console.log("[RPR] Step 13: 底部宫位说明完成");
    } catch(e) { throw new Error("Step 13 底部宫位: " + e.message); }

    // 重新生成按钮
    html += '<button class="submit-btn" style="margin-top:16px;background:var(--card2);color:var(--dark);border:1px solid var(--border);" onclick="document.getElementById(\'profileResultArea\').style.display=\'none\';document.getElementById(\'workspace\').style.display=\'flex\';openProfileModal();">🔄 重新输入出生数据</button>';

    console.log("[RPR] Step 14: 写入DOM...");
    resultArea.innerHTML = html;
    resultArea.scrollIntoView({ behavior: "smooth" });
    console.log("[RPR] Step 15: 渲染全部完成 ✓");
  } catch(e) {
    console.error("[RPR] 致命错误:", e, e.stack);
    alert("渲染结果时出错 [" + (e.stepLabel || "未知步骤") + "]：" + (e.message || e));
  }
}

function highlightGeneKeyOnMandala(gateNum) {
  clearMandalaHighlights();
  var parts = String(gateNum).split(".");
  var gateOnly = parts[0];
  var lineNum = parts[1] || "1";
  var nodes = document.querySelectorAll(".gk-node");
  nodes.forEach(function(n) {
    if (n.getAttribute("data-gate") === gateOnly) {
      n.classList.add("gk-active");
      n.classList.add("gk-profile");
      var bg = n.querySelector(".node-bg");
      if (bg) bg.setAttribute("stroke-width", "3");
      activeGateNode = n;
    }
  });
  // 打开详情面板（使用传入的完整爻线号）
  var code = gateOnly + "." + lineNum;
  showGeneKeyDetail(code);
}

initV4();
</script>
</body>
</html>
