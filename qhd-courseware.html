<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量子人类设计专家认证课程 · 完整课件</title>
<style>
/* ========== 全局变量 ========== */
:root {
  --bg: #F5F0E8;
  --bg-card: #FFFBF5;
  --bg-sidebar: #2D2118;
  --bg-sidebar-hover: #3D3128;
  --primary: #C4956A;
  --primary-light: #D8B898;
  --primary-dark: #A87B52;
  --gold: #D4A843;
  --gold-light: #E8C868;
  --dark: #2D2118;
  --dark-soft: #4A3D32;
  --text: #3D3530;
  --text-light: #6B5D52;
  --text-sidebar: #D8C8B8;
  --text-sidebar-active: #F5E6D3;
  --border: #E8DCC8;
  --border-dark: #D4C4B0;
  --shadow: 0 2px 8px rgba(45, 33, 24, 0.08);
  --shadow-md: 0 4px 16px rgba(45, 33, 24, 0.12);
  --radius: 8px;
  --radius-lg: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Georgia", "Noto Serif SC", "Songti SC", "STSong", serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.85;
  min-height: 100vh;
}

/* ========== 布局 ========== */
.app { display: flex; min-height: 100vh; }

/* ========== 侧边栏 ========== */
.sidebar {
  width: 300px;
  background: var(--bg-sidebar);
  color: var(--text-sidebar);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(196, 149, 106, 0.2);
  text-align: center;
}

.sidebar-header .logo {
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.sidebar-header h1 {
  font-size: 19px;
  color: var(--text-sidebar-active);
  font-weight: normal;
  line-height: 1.4;
}

.sidebar-header .subtitle {
  font-size: 12px;
  color: var(--primary-light);
  margin-top: 8px;
}

/* 课程级别导航 */
.level-nav { flex: 1; padding: 12px 0; }

.level-section { margin-bottom: 4px; }

.level-title {
  padding: 12px 20px 8px;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}

.level-title:hover { color: var(--gold-light); }

.level-title .arrow {
  font-size: 10px;
  transition: transform 0.2s;
  margin-left: auto;
}

.level-title.collapsed .arrow { transform: rotate(-90deg); }

.level-lessons { overflow: hidden; transition: max-height 0.3s ease; }

.level-title.collapsed + .level-lessons { max-height: 0 !important; }

.lesson-item {
  padding: 10px 20px 10px 36px;
  font-size: 13.5px;
  color: var(--text-sidebar);
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  line-height: 1.5;
}

.lesson-item:hover {
  background: var(--bg-sidebar-hover);
  color: var(--text-sidebar-active);
}

.lesson-item.active {
  background: rgba(196, 149, 106, 0.12);
  color: var(--gold);
  border-left-color: var(--gold);
}

.lesson-item .lesson-num {
  font-size: 11px;
  color: var(--primary);
  margin-right: 6px;
}

/* 进度区 */
.sidebar-progress {
  padding: 16px 20px;
  border-top: 1px solid rgba(196, 149, 106, 0.2);
}

.progress-label {
  font-size: 12px;
  color: var(--text-sidebar);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

.progress-bar {
  height: 6px;
  background: rgba(196, 149, 106, 0.15);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
  width: 0%;
}

/* ========== 主内容区 ========== */
.main {
  flex: 1;
  margin-left: 300px;
  padding: 0;
}

/* 顶部栏 */
.topbar {
  position: sticky;
  top: 0;
  background: rgba(245, 240, 232, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}

.topbar-left { display: flex; align-items: center; gap: 16px; }

.topbar .menu-btn {
  display: none;
  background: none;
  border: none;
  font-size: 20px;
  color: var(--dark);
  cursor: pointer;
  padding: 4px;
}

.breadcrumb {
  font-size: 13px;
  color: var(--text-light);
}

.breadcrumb span { color: var(--primary); }

.topbar-right { display: flex; gap: 12px; }

.nav-btn {
  padding: 8px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border-dark);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 内容容器 */
.content { padding: 40px; max-width: 900px; margin: 0 auto; }

/* 课程封面页 */
.cover-page {
  text-align: center;
  padding: 60px 40px;
}

.cover-page .cover-ornament {
  font-size: 28px;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 8px;
}

.cover-page h1 {
  font-size: 32px;
  color: var(--dark);
  font-weight: normal;
  margin-bottom: 12px;
  line-height: 1.4;
}

.cover-page .cover-subtitle {
  font-size: 16px;
  color: var(--primary);
  margin-bottom: 30px;
  font-style: italic;
}

.cover-page .cover-desc {
  font-size: 15px;
  color: var(--text-light);
  max-width: 600px;
  margin: 0 auto 40px;
  line-height: 2;
}

.course-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 700px;
  margin: 0 auto 40px;
}

.meta-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  text-align: center;
}

.meta-card .meta-icon { font-size: 24px; margin-bottom: 8px; }

.meta-card .meta-label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }

.meta-card .meta-value { font-size: 14px; color: var(--dark); font-weight: bold; }

/* 级别概览卡片 */
.level-overview {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 30px;
}

.overview-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
}

.overview-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--primary);
  transform: translateY(-2px);
}

.overview-card .ov-level {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.overview-card .ov-title {
  font-size: 16px;
  color: var(--dark);
  margin-bottom: 8px;
  font-weight: bold;
}

.overview-card .ov-desc {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.7;
}

.overview-card .ov-lessons {
  font-size: 12px;
  color: var(--primary);
  margin-top: 12px;
}

/* ========== 课程内容样式 ========== */
.lesson-header { margin-bottom: 32px; }

.lesson-header .lesson-badge {
  display: inline-block;
  padding: 4px 14px;
  background: var(--primary);
  color: white;
  font-size: 12px;
  border-radius: 20px;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.lesson-header h2 {
  font-size: 26px;
  color: var(--dark);
  font-weight: normal;
  margin-bottom: 8px;
  line-height: 1.4;
}

.lesson-header .lesson-subtitle {
  font-size: 14px;
  color: var(--primary);
  font-style: italic;
  margin-bottom: 16px;
}

.lesson-header .lesson-quote {
  padding: 16px 24px;
  background: var(--bg-card);
  border-left: 4px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px;
  color: var(--dark-soft);
  font-style: italic;
  line-height: 1.8;
}

/* 章节标题 */
.section-title {
  font-size: 19px;
  color: var(--dark);
  margin: 32px 0 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title .section-icon { color: var(--gold); font-size: 18px; }

/* 子标题 */
.subsection-title {
  font-size: 16px;
  color: var(--primary-dark);
  margin: 24px 0 12px;
  font-weight: bold;
}

/* 正文段落 */
.content p {
  margin-bottom: 14px;
  font-size: 14.5px;
  line-height: 1.9;
  color: var(--text);
}

.content p strong { color: var(--dark); }

/* 信息卡片 */
.info-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin: 16px 0;
  box-shadow: var(--shadow);
}

.info-card .card-title {
  font-size: 15px;
  color: var(--dark);
  font-weight: bold;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info-card .card-icon { font-size: 18px; }

/* 类型卡片网格 */
.type-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin: 20px 0;
}

.type-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: all 0.3s;
  border-top: 3px solid var(--primary);
}

.type-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

.type-card .type-name {
  font-size: 15px;
  color: var(--dark);
  font-weight: bold;
  margin-bottom: 4px;
}

.type-card .type-qhd {
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 10px;
  font-style: italic;
}

.type-card .type-desc { font-size: 13.5px; color: var(--text); line-height: 1.7; }

.type-card .type-gifts {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border-dark);
  font-size: 12.5px;
  color: var(--text-light);
}

.type-card .type-gifts strong { color: var(--primary-dark); }

/* 中心卡片 */
.center-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin: 20px 0;
}

.center-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.center-card .center-shape {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
}

.center-card .center-info { flex: 1; }

.center-card .center-name {
  font-size: 14px;
  color: var(--dark);
  font-weight: bold;
  margin-bottom: 4px;
}

.center-card .center-theme {
  font-size: 12.5px;
  color: var(--text-light);
  margin-bottom: 6px;
}

.center-card .center-detail { font-size: 13px; color: var(--text); line-height: 1.6; }

/* 回路卡片 */
.circuit-block {
  margin: 20px 0;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
}

.circuit-header {
  padding: 14px 20px;
  font-size: 15px;
  font-weight: bold;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
}

.circuit-body { background: var(--bg-card); padding: 16px 20px; }

.circuit-item {
  padding: 10px 0;
  border-bottom: 1px dashed var(--border-dark);
}

.circuit-item:last-child { border-bottom: none; }

.circuit-item .ci-name {
  font-size: 14px;
  color: var(--dark);
  font-weight: bold;
  margin-bottom: 4px;
}

.circuit-item .ci-channels {
  font-size: 12.5px;
  color: var(--primary);
  font-family: "Courier New", monospace;
}

.circuit-item .ci-desc { font-size: 13px; color: var(--text); margin-top: 4px; }

/* 表格 */
.content-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13.5px;
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.content-table th {
  background: var(--primary);
  color: white;
  padding: 12px 16px;
  text-align: left;
  font-size: 13px;
  font-weight: bold;
}

.content-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.content-table tr:last-child td { border-bottom: none; }

.content-table tr:hover td { background: rgba(196, 149, 106, 0.05); }

/* 要点列表 */
.key-points {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin: 16px 0;
}

.key-points .kp-title {
  font-size: 14px;
  color: var(--dark);
  font-weight: bold;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.key-points ul { list-style: none; }

.key-points li {
  padding: 6px 0 6px 24px;
  position: relative;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.7;
}

.key-points li::before {
  content: "◆";
  position: absolute;
  left: 0;
  color: var(--gold);
  font-size: 12px;
  top: 7px;
}

/* 提示框 */
.callout {
  padding: 16px 20px;
  border-radius: var(--radius);
  margin: 16px 0;
  font-size: 13.5px;
  line-height: 1.8;
  border-left: 4px solid;
}

.callout.tip { background: #F0F5E8; border-color: #8BA855; color: #3D4A2E; }
.callout.warn { background: #FDF5E8; border-color: var(--gold); color: #5A4A2D; }
.callout.insight { background: #F5EDE8; border-color: var(--primary); color: var(--dark-soft); }
.callout.practice { background: #E8F0F5; border-color: #5588A8; color: #2E4A5A; }

.callout .callout-label {
  font-weight: bold;
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
}

/* 爻线卡片 */
.line-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 16px 0;
}

.line-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.line-card .line-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
}

.line-card .line-name { font-size: 13px; color: var(--dark); font-weight: bold; margin-bottom: 4px; }

.line-card .line-desc { font-size: 12px; color: var(--text-light); line-height: 1.5; }

/* 轮廓卡片 */
.profile-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin: 16px 0;
}

.profile-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.profile-card .profile-num {
  font-size: 18px;
  color: var(--gold);
  font-weight: bold;
  flex-shrink: 0;
  min-width: 50px;
}

.profile-card .profile-info { flex: 1; }

.profile-card .profile-name { font-size: 13px; color: var(--dark); font-weight: bold; margin-bottom: 2px; }

.profile-card .profile-desc { font-size: 12.5px; color: var(--text); line-height: 1.5; }

/* 课时小结 */
.lesson-summary {
  background: linear-gradient(135deg, var(--bg-card), #F0E8D8);
  border: 1px solid var(--border-dark);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin: 32px 0 16px;
}

.lesson-summary .summary-title {
  font-size: 16px;
  color: var(--dark);
  font-weight: bold;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.lesson-summary p { font-size: 14px; color: var(--text); margin-bottom: 10px; }

/* 页脚 */
.footer {
  text-align: center;
  padding: 24px 40px;
  font-size: 12px;
  color: var(--text-light);
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

/* 响应式 */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .topbar .menu-btn { display: block; }
  .content { padding: 24px 16px; }
  .type-grid, .center-grid, .profile-grid, .line-grid, .level-overview, .course-meta {
    grid-template-columns: 1fr;
  }
  .cover-page { padding: 30px 20px; }
  .cover-page h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="app">

<!-- ========== 侧边栏 ========== -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">Quantum Human Design</div>
    <h1>量子人类设计<br>专家认证课程</h1>
    <div class="subtitle">基于 Dr. Karen Parker 课程体系</div>
  </div>

  <div class="level-nav" id="levelNav">

  </div>

  <div class="sidebar-progress">

      <span>学习进度</span>
      <span id="progressText">0 / 23</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

</nav>

<!-- ========== 主内容区 ========== -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="breadcrumb" id="breadcrumb">课程首页</div>
    </div>
    <div class="topbar-right">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 上一课</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">下一课 →</button>

  </div>

  <div class="content" id="content">

    <span style="margin-top:8px;display:inline-block;">Powered By Kan Man Tang</span>
  </div>
</div>

</div>

// ========== 课程数据 ==========
const courseData = [

  {

          {

// ========== 渲染逻辑 ==========
let currentLesson = -1; // -1 = 封面页
let completedLessons = new Set();

// 生成导航
function buildNav() {
  const nav = document.getElementById('levelNav');
  let html = '';
  courseData.forEach((level, li) => {
    const lessons = level.lessons;
    const lessonItems = lessons.map((lesson, lei) => {
      const globalIdx = getGlobalLessonIndex(li, lei);
      return `<div class="lesson-item ${currentLesson === globalIdx ? 'active' : ''}" onclick="goToLesson(${globalIdx})">
        <span class="lesson-num">L${level.level}.${lei + 1}</span>${lesson.title}
      </div>`;
    }).join('');
    html += `
      <div class="level-section">
        <div class="level-title" onclick="toggleLevel(this)">
          ${level.levelTitle}
          <span class="arrow">▼</span>
        </div>
        <div class="level-lessons" style="max-height:1000px;">
          ${lessonItems}
        </div>
      </div>`;
  });
  nav.innerHTML = html;
}

function getGlobalLessonIndex(levelIdx, lessonIdx) {
  let count = 0;
  for (let i = 0; i < levelIdx; i++) {
    count += courseData[i].lessons.length;
  }
  return count + lessonIdx;
}

function toggleLevel(el) {
  el.classList.toggle('collapsed');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// 渲染封面页
function renderCover() {
  const totalLessons = courseData.reduce((sum, l) => sum + l.lessons.length, 0);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="cover-page">
      <div class="cover-ornament">✦ ◆ ✦</div>
      <h1>量子人类设计专家认证课程</h1>
      <div class="cover-subtitle">Quantum Human Design Specialist Certification</div>
      <div class="cover-desc">
        基于 Dr. Karen Parker 的 Quantum Human Design™ 认证课程体系开发。
        从基础认知到专业图表解读，四个级别二十节课，带你走进人类设计的能量世界——
        不是作为一套"规则系统"，而是作为一条活出真实自我的路径。
      </div>
      <div class="course-meta">
        <div class="meta-card">
          <div class="meta-icon">📚</div>
          <div class="meta-label">课程级别</div>
          <div class="meta-value">4 个级别</div>
        </div>
        <div class="meta-card">
          <div class="meta-icon">📖</div>
          <div class="meta-label">课程节数</div>
          <div class="meta-value">${totalLessons} 节课</div>
        </div>
        <div class="meta-card">
          <div class="meta-icon">🌱</div>
          <div class="meta-label">学习方式</div>
          <div class="meta-value">自主学习</div>
        </div>
      </div>
      <div class="section-title"><span class="section-icon">◈</span>课程结构总览</div>
      <div class="level-overview">
        ${courseData.map((level, li) => `
          <div class="overview-card" onclick="goToLesson(${getGlobalLessonIndex(li, 0)})">
            <div class="ov-level">LEVEL ${level.level}</div>
            <div class="ov-title">${level.levelTitle.split('·')[1].trim()}</div>
            <div class="ov-desc">${level.lessons[0].quote.substring(0, 80)}...</div>
            <div class="ov-lessons">${level.lessons.length} 节课 →</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  updateBreadcrumb('课程首页');
}

// 渲染课程内容
function renderLesson(globalIdx) {
  let levelIdx = 0, lessonIdx = 0;
  let count = 0;
  for (let i = 0; i < courseData.length; i++) {
    if (count + courseData[i].lessons.length > globalIdx) {
      levelIdx = i;
      lessonIdx = globalIdx - count;
      break;
    }
    count += courseData[i].lessons.length;
  }

  const level = courseData[levelIdx];
  const lesson = level.lessons[lessonIdx];

  let sectionsHtml = '';
  lesson.sections.forEach(sec => {
    sectionsHtml += `
      <div class="section-title"><span class="section-icon">${sec.icon}</span>${sec.title}</div>
      <div class="content-body">${sec.body}</div>`;
  });

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="lesson-header">
      <span class="lesson-badge">${lesson.badge}</span>
      <h2>${lesson.title}</h2>
      <div class="lesson-subtitle">${lesson.subtitle}</div>
      <div class="lesson-quote">"${lesson.quote}"</div>
    </div>
    ${sectionsHtml}
    <div class="lesson-summary">
      <div class="summary-title"><span>📖</span>本课小结</div>
      <p>${lesson.summary}</p>
    </div>
  `;

  updateBreadcrumb(`${level.levelTitle} → 第${lessonIdx + 1}课`);
  completedLessons.add(globalIdx);
  updateProgress();
  window.scrollTo(0, 0);
}

function updateBreadcrumb(text) {
  document.getElementById('breadcrumb').innerHTML = `<span>${text}</span>`;
}

function updateProgress() {
  const total = courseData.reduce((sum, l) => sum + l.lessons.length, 0);
  const done = completedLessons.size;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';
}

function goToLesson(idx) {
  currentLesson = idx;
  renderLesson(idx);
  buildNav();
  if (window.innerWidth <= 900) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function navigate(dir) {
  if (currentLesson === -1) {
    if (dir > 0) goToLesson(0);
    return;
  }
  const total = courseData.reduce((sum, l) => sum + l.lessons.length, 0);
  const next = currentLesson + dir;
  if (next < 0) {
    currentLesson = -1;
    renderCover();
    buildNav();
  } else if (next >= total) {
    return;
  } else {
    goToLesson(next);
  }
  updateNavButtons();
}

function updateNavButtons() {
  const total = courseData.reduce((sum, l) => sum + l.lessons.length, 0);
  document.getElementById('prevBtn').disabled = currentLesson === -1;
  document.getElementById('nextBtn').disabled = currentLesson === total - 1;
}

// 键盘导航
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// 初始化
buildNav();
renderCover();
updateNavButtons();
</script>
